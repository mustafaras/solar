  border: 1px solid var(--glass-border);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 var(--edge-in), 0 14px 34px -20px rgba(0,0,0,0.8);
  backdrop-filter: blur(7px);
  user-select: none;
}
.minimap-h {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 700; letter-spacing: 0.18em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.minimap-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--brand-gold); }
.minimap-hover {
  margin-left: auto; color: var(--accent-bright);
  letter-spacing: 0.06em; text-transform: none; font-weight: 700;
  max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.minimap-cv { display: block; cursor: default; }

/* ── On-screen adaptive scale bar (bottom-left of scene) ── */
.scalebar {
  position: absolute; left: 16px; bottom: 16px; z-index: 5;
  display: flex; flex-direction: column; gap: 4px;
  padding: 8px 11px;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-sm);
  box-shadow: inset 0 1px 0 var(--edge-in);
  backdrop-filter: blur(7px);
  pointer-events: none; user-select: none;
}
.scalebar-ruler {
  position: relative; height: 7px;
  border-left: 1.5px solid var(--accent-bright);
  border-right: 1.5px solid var(--accent-bright);
}
.scalebar-ruler::before {
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1.5px; background: var(--cyan-dim);
}
.scalebar-text { display: flex; align-items: baseline; gap: 8px; }
.scalebar-main {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
  color: var(--text-data); font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
}
.scalebar-sub {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.06em;
  color: var(--text-muted);
}
body.photo-mode .scalebar { display: none !important; }
@media (max-width: 900px) { .scalebar { display: none; } }

/* ── Now / Live time control ── */
.bb-now {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--text-secondary); cursor: pointer; flex-shrink: 0;
  transition: all .18s var(--ease);
}
.bb-now:hover { color: var(--accent-bright); border-color: var(--glass-border-bright); }
.bb-now-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.bb-now.live { color: #67E0A3; border-color: rgba(103,224,163,0.4); background: rgba(103,224,163,0.08); }
.bb-now.live .bb-now-dot { background: #67E0A3; box-shadow: 0 0 calc(8px * var(--glow)) #67E0A3; animation: livePulse 1.8s ease-in-out infinite; }
@keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
body.photo-mode .minimap, body.photo-mode .cmdk-backdrop { display: none !important; }
@media (max-width: 900px) { .minimap { display: none; } }
.tool-btn.cmdk-btn { gap: 6px; }
.tool-btn .kbd-chip {
  font-family: var(--font-mono); font-size: 8px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 4px; border: 1px solid var(--rule); border-radius: 3px;
  color: var(--text-muted); line-height: 1;
}

/* ── Compare chart — paired normalised bars ── */
.cmp-chart {
  padding: 16px 22px 14px;
  border-bottom: 1px solid var(--rule);
}
.cmp-chart-legend {
  display: flex; gap: 18px; margin: 4px 0 12px;
}
.cmp-leg {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--text-secondary);
}
.cmp-swatch { width: 9px; height: 9px; border-radius: 2px; }
.cmp-metric {
  display: grid; grid-template-columns: 92px 1fr; gap: 14px;
  align-items: center; padding: 5px 0;
}
.cmp-metric-label {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
}
.cmp-bars { display: flex; flex-direction: column; gap: 4px; }
.cmp-bar-row { display: flex; align-items: center; gap: 10px; }
.cmp-bar-track {
  flex: 1; height: 7px; border-radius: 2px;
  background: var(--rule); overflow: hidden;
}
.cmp-bar-fill {
  height: 100%; border-radius: 2px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
  transform-origin: left;
  animation: cmpGrow .6s var(--ease) both;
}
@keyframes cmpGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.cmp-bar-val {
  width: 96px; flex-shrink: 0; text-align: right;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  color: var(--text-data); font-variant-numeric: tabular-nums;
}
.cmp-bar-val .u { color: var(--text-muted); font-size: 0.78em; font-weight: 500; }

/* ── Multi-body compare extensions ── */
.compare-multi { display: flex; flex-direction: column; }
.compare-multi-head { position: relative; padding: 16px 22px 14px; border-bottom: 1px solid var(--rule); }
.compare-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.compare-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 9px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  font-family: var(--font-display); font-size: 12px; font-weight: 600;
  color: var(--text-primary); letter-spacing: 0.01em;
}
.compare-chip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.compare-chip-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 15px; height: 15px; margin-left: 2px; padding: 0;
  background: none; border: none; color: var(--text-muted); cursor: pointer; border-radius: 3px;
}
.compare-chip-x:hover { color: var(--accent-bright); background: rgba(255,255,255,0.06); }
.compare-add-wrap { position: relative; }
.compare-add {
  padding: 5px 11px; border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--cyan) 11%, transparent);
  border: 1px dashed var(--cyan-dim); color: var(--accent-bright);
  font-family: var(--font-display); font-size: 11px; font-weight: 600; cursor: pointer;
  letter-spacing: 0.04em;
}
.compare-add:hover { background: color-mix(in srgb, var(--cyan) 18%, transparent); }
.compare-picker {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 6;
  width: 200px; max-height: 280px; overflow-y: auto;
  background: var(--bg-panel-solid); border: 1px solid var(--glass-border);
  border-top: 1px solid var(--bezel); border-radius: var(--r-md);
  box-shadow: 0 20px 50px -18px rgba(0,0,0,0.8); padding: 5px;
}
.compare-picker-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 7px 9px; border-radius: var(--r-xs);
  background: none; border: none; cursor: pointer; text-align: left;
  font-family: var(--font-display); font-size: 12.5px; color: var(--text-secondary);
}
.compare-picker-item:hover { background: color-mix(in srgb, var(--cyan) 14%, transparent); color: var(--accent-bright); }

.cmp-chart-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.cmp-scale-toggle {
  font-family: var(--font-mono); font-size: 8.5px; font-weight: 700; letter-spacing: 0.14em;
  padding: 4px 9px; border-radius: var(--r-xs);
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  color: var(--text-muted); cursor: pointer;
}
.cmp-scale-toggle.on { color: var(--accent-bright); border-color: var(--cyan-dim); background: color-mix(in srgb, var(--cyan) 12%, transparent); }
.cmp-chart-seg { display: inline-flex; border: 1px solid var(--glass-border); border-radius: var(--r-xs); overflow: hidden; }
.cmp-chart-seg button {
  font-family: var(--font-mono); font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
  padding: 4px 9px; background: transparent; border: none; cursor: pointer;
  color: var(--text-muted);
}
.cmp-chart-seg button.on { color: var(--on-accent); background: var(--cyan); }
.cmp-radar-note { padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px; }

.compare-grid-table { display: grid; gap: 1px; background: var(--rule); margin: 0 22px 18px; border: 1px solid var(--rule); border-radius: var(--r-md); overflow: hidden; }
.cgt-cell { background: var(--bg-panel-solid); padding: 9px 12px; font-size: 12px; }
.cgt-corner { background: var(--bg-deep); }
.cgt-head {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-display); font-weight: 700; color: var(--text-primary);
  background: var(--bg-deep); letter-spacing: 0.01em;
}
.cgt-label {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center;
}
.cgt-val {
  font-family: var(--font-mono); font-weight: 700; color: var(--text-data);
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
}

/* ── Observation block (Earth-relative astrometry + tilt diagram) ── */
.obs-wrap { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; }
.obs-data { min-width: 0; }
.obs-tilt {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 8px 6px 6px; border: 1px solid var(--rule); border-radius: var(--r-md);
  background: var(--bg-panel-solid);
}
.obs-tilt-label {
  font-family: var(--font-mono); font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--text-muted); text-transform: uppercase; text-align: center;
}

/* ════════════════════════════════════════════════════════════════
   ELITE BRAND SYSTEM  +  modal instrument bezel
   A precise orbital monogram, a two-weight wordmark with a gold
   hairline, and a registration-mark bezel carried consistently
   across every modal — the chrome of a bespoke observatory console.
════════════════════════════════════════════════════════════════ */
:root{
  --brand-gold: #D8B36A;
  --brand-gold-soft: rgba(216, 179, 106, 0.5);
  --bezel: color-mix(in srgb, var(--brand-gold) 52%, transparent);
}
html[data-ds="atelier"]{ --brand-gold: #E6CB94; }
html[data-ds="aurora"]{ --brand-gold: #EBD3A0; }

/* ── Monogram: orbital reticle (outer ring · inner ring · node · core) ── */
.brand { gap: 12px; }
.brand-logo {
  width: 30px; height: 30px;
  background: radial-gradient(circle, var(--brand-gold) 0 1.7px, transparent 2.3px);
  border: 1.4px solid var(--brand-gold-soft);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
}
.brand-logo::after { inset: 4px; border: 1px solid var(--rule); }
.brand-logo::before {
  content: ''; position: absolute;
  top: -2px; left: 50%; width: 3px; height: 3px; margin-left: -1.5px;
  border-radius: 50%; background: var(--cyan);
  box-shadow: 0 0 calc(6px * var(--glow)) var(--cyan);
}

/* ── Wordmark: SOLAR (heavy) · 3D (hairline chip) · gold underline ── */
.brand-name {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--text-primary);
  text-transform: uppercase;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--brand-gold-soft);
}
.brand-name .bn-2 {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em;
  color: var(--brand-gold);
  padding: 1.5px 4px;
  border: 1px solid var(--brand-gold-soft);
  border-radius: 3px;
  line-height: 1;
}
.brand-tag {
  letter-spacing: 0.30em;
  color: var(--text-muted);
  margin-top: 5px;
}

/* ── Modal instrument bezel — registration brackets on all 4 corners ── */
.lib-modal, .moon-modal, .compare-modal { position: relative; }
.lib-modal { border-top-color: var(--bezel); }
.moon-modal, .compare-modal { border-top-color: var(--bezel); }
.lib-modal::after, .moon-modal::after, .compare-modal::after {
  content: ''; position: absolute; inset: 9px;
  pointer-events: none; z-index: 4;
  background-image:
    linear-gradient(var(--bezel), var(--bezel)), linear-gradient(var(--bezel), var(--bezel)),
    linear-gradient(var(--bezel), var(--bezel)), linear-gradient(var(--bezel), var(--bezel)),
    linear-gradient(var(--bezel), var(--bezel)), linear-gradient(var(--bezel), var(--bezel)),
    linear-gradient(var(--bezel), var(--bezel)), linear-gradient(var(--bezel), var(--bezel));
  background-repeat: no-repeat;
  background-size: 15px 1px, 1px 15px, 15px 1px, 1px 15px, 15px 1px, 1px 15px, 15px 1px, 1px 15px;
  background-position:
    top left, top left, top right, top right,
    bottom left, bottom left, bottom right, bottom right;
}

/* ── Branded modal eyebrow — mini reticle mark, gold key line ── */
.lib-eyebrow, .moon-modal-eyebrow { color: var(--brand-gold); }
.lib-eyebrow-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle, var(--brand-gold) 0 1.3px, transparent 1.9px);
  border: 1px solid var(--brand-gold-soft);
  box-shadow: none;
}
.moon-modal-eyebrow { display: inline-flex; align-items: center; gap: 8px; }
.moon-modal-eyebrow::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle, var(--brand-gold) 0 1.3px, transparent 1.9px);
  border: 1px solid var(--brand-gold-soft);
}
.lib-title, .moon-modal-title, .compare-name { letter-spacing: 0.01em; }

/* Modal header gets a faint gold key-rule under it */
.lib-header { border-bottom-color: var(--rule); box-shadow: 0 1px 0 var(--bezel); }

/* Backdrop: deeper, with a fine central vignette for focus */
.lib-backdrop {
  background: radial-gradient(ellipse at center, rgba(3,5,11,0.78), rgba(2,3,8,0.94));
  backdrop-filter: blur(10px) saturate(0.9);
}

/* Popovers inherit the same premium edge for consistency */
.tours-popover, .date-popover, .kbd-help {
  box-shadow: inset 0 1px 0 var(--edge-in), 0 18px 44px -22px rgba(0,0,0,0.85);
  border-top: 1px solid var(--bezel);
}

/* ── Splash carries the elite identity ── */
.splash-title {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.28em;
  color: var(--text-primary);
}
.splash-sub { letter-spacing: 0.30em; color: var(--text-muted); }
.splash-orbit::before { border-color: var(--brand-gold-soft); }

/* ════════════════════════════════════════════════════════════════
   PRO TOOLS  ·  instrument dock + cinematic + planner modals
════════════════════════════════════════════════════════════════ */
.pro-dock {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  z-index: 40;
  display: flex; align-items: center; gap: 3px;
  padding: 5px 7px;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border);
  border-top: 1px solid var(--bezel);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 var(--edge-in), 0 16px 40px -22px rgba(0,0,0,0.85);
  backdrop-filter: blur(10px) saturate(1.05);
}
.pro-dock-brand {
  font-family: var(--font-mono); font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.22em; color: var(--brand-gold);
  padding: 0 5px 0 3px;
}
.pro-dock-sep { width: 1px; height: 18px; background: var(--rule); margin: 0 2px; }
.pro-dock-btn {
  position: relative;
  width: 32px; height: 30px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--text-secondary); cursor: pointer;
  transition: all .16s var(--ease);
}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── ICON (shared monoline set, currentColor) ──────────────────
function Icon({ name, size = 16, stroke = 1.6, className, style }) {
  const inner = (window.__ICONS && window.__ICONS[name]) || '';
  return (
    <svg
      width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
      className={className}
      style={{ display: 'block', flexShrink: 0, ...(style || {}) }}
      dangerouslySetInnerHTML={{ __html: inner }}
    />
  );
}

// ─── UNIT + SCALE BAR (dashboard-grade data cell helpers) ──────────────
function Unit({ children }) { return <span className="u">{children}</span>; }

// Count-up readout — eases from the previous value to the new one whenever
// the selection changes, so figures "spin up" like an instrument register.
function AnimatedNum({ value, decimals = 0, format }) {
  const [disp, setDisp] = React.useState(value);
  const prev = React.useRef(value);
  const raf = React.useRef(0);
  React.useEffect(() => {
    const from = prev.current, to = value;
    prev.current = value;
    if (from === to || !isFinite(from) || !isFinite(to)) { setDisp(to); return; }
    const noMo = document.documentElement.dataset.motion === 'off'
      || window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (noMo) { setDisp(to); return; }
    const dur = 560, t0 = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      setDisp(from + (to - from) * e);
      if (p < 1) raf.current = requestAnimationFrame(tick);
    };
    cancelAnimationFrame(raf.current);
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  const out = format ? format(disp) : disp.toFixed(decimals);
  return <>{out}</>;
}

function Bar({ frac, color }) {
  const w = Math.max(0, Math.min(1, frac || 0)) * 100;
  return (
    <div className="data-bar">
      <div className="data-bar-fill" style={{ width: w + '%', background: color || 'var(--cyan)' }}></div>
    </div>
  );
}

// ─── TELEMETRY READOUT (live viewing-geometry HUD, top-left of scene) ──────
// Reads the live camera + clock and surfaces the kind of coordinate block a
// real sky-observation console shows: ecliptic longitude/latitude of the
// camera, az/alt of the view axis, heliocentric range, FOV, UTC + Julian Date.
function Telemetry({ sim, simDate, cameraDist, selectedId }) {
  if (!sim || !sim.camera || !sim.controls) return null;
  const cam = sim.camera.position;
  const tgt = sim.controls.target;
  const THREE = window.THREE;

  // View axis → azimuth / altitude
  const dir = new THREE.Vector3().subVectors(tgt, cam);
  const len = dir.length() || 1; dir.multiplyScalar(1 / len);
  let az = Math.atan2(dir.x, -dir.z) * 180 / Math.PI; if (az < 0) az += 360;
  const alt = Math.asin(Math.max(-1, Math.min(1, dir.y))) * 180 / Math.PI;

  // Camera position → heliocentric ecliptic longitude / latitude
  const r = cam.length() || 1;
  let lon = Math.atan2(cam.z, cam.x) * 180 / Math.PI; if (lon < 0) lon += 360;
  const lat = Math.asin(Math.max(-1, Math.min(1, cam.y / r))) * 180 / Math.PI;

  const d = simDate instanceof Date ? simDate : new Date(simDate);
  const jd = d.getTime() / 86400000 + 2440587.5;
  const utc = d.toISOString().slice(0, 19).replace('T', ' ');
  const pad = (n, p = 5) => n.toFixed(2).padStart(p, ' ');

  const target = selectedId
    ? (window.SOL_DATA.find(b => b.id === selectedId) || {}).name || selectedId
    : 'free';

  // Real geocentric RA/Dec (J2000) of the selected body — proper astrometry
  let raDec = null;
  const OM = window.OrbitalMechanics;
  if (selectedId && selectedId !== 'sun' && OM && OM.planetHeliocentricAU) {
    const bp = OM.planetHeliocentricAU(selectedId, d);
    const ep = OM.planetHeliocentricAU('earth', d);
    if (bp && ep) {
      // planetHeliocentricAU returns {x: ecl_x, y: ecl_z(out), z: ecl_y}
      const gx = bp.x - ep.x;          // ecliptic x
      const gy = bp.z - ep.z;          // ecliptic y
      const gz = bp.y - ep.y;          // ecliptic z (out of plane)
      const e = 23.4393 * Math.PI / 180, ce = Math.cos(e), se = Math.sin(e);
      const eqx = gx;
      const eqy = gy * ce - gz * se;
      const eqz = gy * se + gz * ce;
      let ra = Math.atan2(eqy, eqx) * 12 / Math.PI; if (ra < 0) ra += 24;
      const dec = Math.atan2(eqz, Math.hypot(eqx, eqy)) * 180 / Math.PI;
      const rh = Math.floor(ra), rm = Math.floor((ra - rh) * 60), rs = Math.round(((ra - rh) * 60 - rm) * 60);
      const dsign = dec < 0 ? '\u2212' : '+', ad = Math.abs(dec);
      const dd = Math.floor(ad), dm = Math.round((ad - dd) * 60);
      const dist = Math.hypot(gx, gy, gz);
      // one-way light time Earth→body (499.0 s per AU)
      const ltSec = dist * 499.004784;
      const lt = ltSec < 90 ? ltSec.toFixed(1) + ' s'
        : ltSec < 5400 ? (ltSec / 60).toFixed(1) + ' min'
        : (ltSec / 3600).toFixed(2) + ' h';
      // solar elongation: angle Sun–Earth–Body (Sun seen from Earth = −ep)
      const dot = (gx * -ep.x + gy * -ep.z + gz * -ep.y);
      const sunDist = Math.hypot(ep.x, ep.y, ep.z) || 1;
      let elong = Math.acos(Math.max(-1, Math.min(1, dot / (dist * sunDist)))) * 180 / Math.PI;
      raDec = {
        ra: `${String(rh).padStart(2,'0')}h ${String(rm).padStart(2,'0')}m ${String(rs).padStart(2,'0')}s`,
        dec: `${dsign}${String(dd).padStart(2,'0')}\u00B0 ${String(dm).padStart(2,'0')}\u2032`,
        dist: dist.toFixed(3),
        lt: lt,
        elong: elong.toFixed(1) + '\u00B0',
      };
    }
  }

  const rows = [
    ['ECL \u03BB', pad(lon) + '\u00B0'],
    ['ECL \u03B2', (lat >= 0 ? '+' : '\u2212') + Math.abs(lat).toFixed(2) + '\u00B0'],
    ['AZ', pad(az) + '\u00B0'],
    ['ALT', (alt >= 0 ? '+' : '\u2212') + Math.abs(alt).toFixed(2) + '\u00B0'],
    ['RANGE', cameraDist.toFixed(1) + ' u'],
    ['FOV', sim.camera.fov.toFixed(1) + '\u00B0'],
  ];

  return (
    <div className="telemetry" aria-hidden="true">
      <div className="tlm-title">
        <span className="tlm-dot"></span>VIEWING GEOMETRY
        <span className="tlm-target">{target}</span>
      </div>
      <div className="tlm-grid">
        {rows.map(([k, v]) => (
          <div className="tlm-row" key={k}>
            <span className="tlm-k">{k}</span>
            <span className="tlm-v">{v}</span>
          </div>
        ))}
      </div>
      <div className="tlm-clock">
        <div className="tlm-row"><span className="tlm-k">UTC</span><span className="tlm-v">{utc}</span></div>
        <div className="tlm-row"><span className="tlm-k">JD</span><span className="tlm-v">{jd.toFixed(4)}</span></div>
      </div>
      {raDec && (
        <div className="tlm-radec">
          <div className="tlm-radec-h">GEOCENTRIC · J2000</div>
          <div className="tlm-row"><span className="tlm-k">RA</span><span className="tlm-v">{raDec.ra}</span></div>
          <div className="tlm-row"><span className="tlm-k">DEC</span><span className="tlm-v">{raDec.dec}</span></div>
          <div className="tlm-row"><span className="tlm-k">{'\u0394 EARTH'}</span><span className="tlm-v">{fmtDistAU(parseFloat(raDec.dist)).val} {fmtDistAU(parseFloat(raDec.dist)).unit}</span></div>
          <div className="tlm-row"><span className="tlm-k">LIGHT</span><span className="tlm-v">{raDec.lt}</span></div>
          <div className="tlm-row"><span className="tlm-k">ELONG</span><span className="tlm-v">{raDec.elong}</span></div>
        </div>
      )}
    </div>
  );
}

// ─── AXIAL TILT DIAGRAM (mini canvas — obliquity + spin sense) ─────────
function AxialTiltDiagram({ body, size = 76 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    cv.width = size * dpr; cv.height = size * dpr;
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size, size);
    const cx = size / 2, cy = size / 2, R = size * 0.3;
    const tilt = (body.axialTiltDeg || 0) * Math.PI / 180;
    // orbital plane reference line
    ctx.strokeStyle = 'rgba(150,168,185,0.28)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(6, cy); ctx.lineTo(size - 6, cy); ctx.stroke();
    ctx.setLineDash([]);
    // planet disc
    const grad = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
    grad.addColorStop(0, lighten(body.color, 0.35));
    grad.addColorStop(1, darken(body.color, 0.45));
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
    // rotation axis (tilted from vertical by obliquity)
    const ax = Math.sin(tilt), ay = -Math.cos(tilt);

    ctx.fillStyle = '#62D9EA';
    ctx.beginPath(); ctx.arc(cx - ax * L, cy - ay * L, 2.4, 0, Math.PI * 2); ctx.fill();

function PhaseDisc({ frac, ang, color = '#cfe4eb', size = 18 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = size * dpr; cv.height = size * dpr;
    const ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size, size);
    const cx = size / 2, cy = size / 2, r = size / 2 - 1.5;
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    const k = Math.max(0, Math.min(1, frac));
    ctx.fillStyle = color;
    ctx.beginPath();
    const ex = r * (2 * k - 1);
    ctx.ellipse(cx, cy, r, r, 0, -Math.PI / 2, Math.PI / 2, false);
    ctx.ellipse(cx, cy, Math.abs(ex), r, 0, Math.PI / 2, -Math.PI / 2, k < 0.5);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,220,235,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

function ObservationBlock({ body, simDate }) {
  if (!body || body.id === 'sun') return null;
  const OM = window.OrbitalMechanics;
  const d = simDate instanceof Date ? simDate : new Date(simDate);
  let dist = null, lt = '—', elong = '—', mag = null, phase = null, phaseAng = null;
  if (OM && OM.planetHeliocentricAU && OM.ELEMENTS[body.id]) {
    const bp = OM.planetHeliocentricAU(body.id, d);
    const ep = OM.planetHeliocentricAU('earth', d);
    if (bp && ep) {
      const gx = bp.x - ep.x, gy = bp.z - ep.z, gz = bp.y - ep.y;
      dist = Math.hypot(gx, gy, gz);
      const r = Math.hypot(bp.x, bp.y, bp.z);     // sun-body distance
      const ltSec = dist * 499.004784;
      lt = ltSec < 90 ? ltSec.toFixed(1) + ' s' : ltSec < 5400 ? (ltSec / 60).toFixed(1) + ' min' : (ltSec / 3600).toFixed(2) + ' h';
      const sunDist = Math.hypot(ep.x, ep.y, ep.z) || 1;
      const dot = gx * -ep.x + gy * -ep.z + gz * -ep.y;
      elong = (Math.acos(Math.max(-1, Math.min(1, dot / (dist * sunDist)))) * 180 / Math.PI).toFixed(1) + '°';
      // apparent magnitude: m = H + 5·log10(r·Δ)  (H = mean absolute magnitude)
      const H = { mercury: -0.6, venus: -4.4, earth: -3.99, mars: -1.5, jupiter: -9.4, saturn: -8.9, uranus: -7.2, neptune: -6.9 }[body.id];
      if (H != null && r > 0 && dist > 0) mag = H + 5 * Math.log10(r * dist);
      // phase angle α = Sun–body–Earth; illuminated fraction k = (1+cos α)/2
      const sx2 = -bp.x, sy2 = -bp.z, sz2 = -bp.y;            // body→Sun
      const ex2 = ep.x - bp.x, ey2 = ep.z - bp.z, ez2 = ep.y - bp.y;  // body→Earth
      const sl2 = Math.hypot(sx2, sy2, sz2) || 1, el2 = Math.hypot(ex2, ey2, ez2) || 1;
      const ca = (sx2 * ex2 + sy2 * ey2 + sz2 * ez2) / (sl2 * el2);
      phaseAng = Math.acos(Math.max(-1, Math.min(1, ca))) * 180 / Math.PI;
      phase = (1 + ca) / 2;
    }
  }
  if (dist == null) return null;
  return (
    <div>
      <div className="panel-h">Observation <span className="panel-h-tag">live · from Earth</span></div>
      <div className="obs-wrap">
        <div className="obs-data">
          <div className="data-grid">
            <div className="data-cell">
              <div className="data-cell-label">Distance from Earth</div>
              <div className="data-cell-value"><AnimatedNum value={parseFloat(fmtDistAU(dist).val)} decimals={fmtDistAU(dist).unit === 'AU' ? 3 : 2} /> <Unit>{fmtDistAU(dist).unit}</Unit></div>
              <div className="data-cell-sub">{(dist * 149.598).toFixed(1)} M km</div>
            </div>
            <div className="data-cell">
              <div className="data-cell-label">Light delay</div>
              <div className="data-cell-value sm">{lt}</div>
            </div>
            <div className="data-cell">
              <div className="data-cell-label">Solar elongation</div>
              <div className="data-cell-value sm">{elong}</div>
            </div>
            <div className="data-cell">
              <div className="data-cell-label">Apparent magnitude</div>
              <div className="data-cell-value sm">{mag != null ? (mag > 0 ? '+' : '') + mag.toFixed(1) : '—'}</div>
              <div className="data-cell-sub">{mag != null ? (mag < 0 ? 'brilliant · naked eye' : mag < 6 ? 'visible · naked eye' : 'telescopic') : ''}</div>
            </div>
            <div className="data-cell">
              <div className="data-cell-label">Illuminated phase</div>
              <div className="data-cell-value sm" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <PhaseDisc frac={phase != null ? phase : 1} ang={phaseAng || 0} color={body.color} />
                {phase != null ? (phase * 100).toFixed(0) + '%' : '—'}
              </div>
              <div className="data-cell-sub">{phaseAng != null ? 'phase angle ' + phaseAng.toFixed(0) + '°' : ''}</div>
            </div>
          </div>
        </div>
        <div className="obs-tilt">
          <AxialTiltDiagram body={body} />
          <div className="obs-tilt-label">{(body.axialTiltDeg || 0).toFixed(1)}° obliquity</div>
        </div>
      </div>
    </div>
  );
}

// ─── REAL-TEXTURE SPHERE THUMBNAIL ────────────────────────────────────
// Loads an equirectangular planet map and sphere-maps it onto a lit disc —
// a genuine textured globe, not a flat gradient. Used across every modal.
const _equirectCache = {};
function getTexUrl(id) {
  const T = window.REAL_TEX || {};
  const e = T[id];
  if (!e) return null;
  const f = e.earth ? e.day : e.map;
  return f ? 'textures/' + f : null;
}
function loadEquirect(url) {
  if (_equirectCache[url]) return Promise.resolve(_equirectCache[url]);
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const w = 512, h = 256;
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      const cx = c.getContext('2d'); cx.drawImage(img, 0, 0, w, h);
      try {
        const data = cx.getImageData(0, 0, w, h);
        _equirectCache[url] = { data: data.data, w, h };
        res(_equirectCache[url]);
      } catch (e) { rej(e); }
    };
    img.onerror = rej; img.src = url;
  });
}
function drawGradientOrb(ctx, size, color) {
  const cx = size / 2, cy = size / 2, r = size * 0.46;
  const grad = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.05, cx, cy, r);
  grad.addColorStop(0, lighten(color, 0.4));
  grad.addColorStop(0.7, color);
  grad.addColorStop(1, darken(color, 0.55));
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
}
function SphereThumb({ id, color = '#888', size = 56, ring = false }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = size * dpr; cv.height = size * dpr;
    const ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size, size);
    drawGradientOrb(ctx, size, color);
    const url = getTexUrl(id);
    if (!url) { addRing(); return; }
    let cancelled = false;
    // light direction (x right, y up, z toward viewer) — upper-left key light
    let lx = -0.5, ly = 0.52, lz = 0.69; const ll = Math.hypot(lx, ly, lz); lx /= ll; ly /= ll; lz /= ll;
    function addRing() {
      if (!ring) return;
      const cx = size / 2, cy = size / 2, r = size * 0.46;
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.32);
      ctx.beginPath(); ctx.ellipse(0, 0, r * 1.7, r * 0.42, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(228,206,156,0.7)'; ctx.lineWidth = Math.max(2, size * 0.05); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, 0, r * 1.4, r * 0.34, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(228,206,156,0.32)'; ctx.lineWidth = Math.max(1, size * 0.02); ctx.stroke();
      ctx.restore();
    }
    loadEquirect(url).then(({ data, w, h }) => {
      if (cancelled) return;
      const R = size / 2 - 1, cxp = size / 2, cyp = size / 2;
      const out = ctx.createImageData(size, size);
      const od = out.data, sd = data;
      const lon0 = Math.PI;
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const nx = (x - cxp) / R, ny = (y - cyp) / R;
          const r2 = nx * nx + ny * ny;
          const o = (y * size + x) * 4;
          if (r2 > 1) { od[o + 3] = 0; continue; }
          const nz = Math.sqrt(1 - r2);
          const lon = Math.atan2(nx, nz) + lon0;
          const lat = Math.asin(Math.max(-1, Math.min(1, -ny)));
          let u = ((lon / (2 * Math.PI)) % 1 + 1) % 1;
          let v = 0.5 - lat / Math.PI;
          const sx = Math.min(w - 1, Math.max(0, (u * w) | 0));
          const sy = Math.min(h - 1, Math.max(0, (v * h) | 0));
          const so = (sy * w + sx) * 4;
          let lam = nx * lx + (-ny) * ly + nz * lz; lam = Math.max(0, lam);
          const sh = 0.16 + 0.95 * lam;
          // subtle terminator + rim
          const rim = r2 > 0.86 ? 1 - (r2 - 0.86) / 0.14 * 0.55 : 1;
          const f = sh * rim;
          od[o] = Math.min(255, sd[so] * f);
          od[o + 1] = Math.min(255, sd[so + 1] * f);
          od[o + 2] = Math.min(255, sd[so + 2] * f);
          od[o + 3] = 255;
        }
      }
      ctx.clearRect(0, 0, size, size);
      ctx.putImageData(out, 0, 0);
      addRing();
    }).catch(() => { addRing(); });
    return () => { cancelled = true; };
  }, [id, size, color, ring]);
  return <canvas ref={ref} style={{ width: size + 'px', height: size + 'px', borderRadius: '50%', display: 'block' }} />;
}

// ─── PLANET ICON (mini canvas thumbnail) ────────────────────────
function PlanetThumb({ body, size = 42 }) {

}
function PlanetThumbGradient({ body, size = 42 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    canvas.width = size * 2; canvas.height = size * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    const cx = size / 2, cy = size / 2, r = size * 0.42;
    if (body.id === 'sun') {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.5);
      g.addColorStop(0, 'rgba(255,230,120,0.8)');
      g.addColorStop(0.6, 'rgba(255,140,30,0.3)');
      g.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
    }
    // Use the procedural texture
    const tex = window.generateTexture(body.id, 256);
    // Map equirectangular onto a sphere — use simple radial gradient approx
    const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
    const c = ctx.getContextAttributes ? body.color : body.color;
    grad.addColorStop(0, lighten(body.color, 0.3));
    grad.addColorStop(0.7, body.color);
    grad.addColorStop(1, darken(body.color, 0.5));
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // Saturn rings hint
    if (body.id === 'saturn') {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.8, r * 0.3, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(220, 200, 150, 0.7)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.restore();
    }
    // Limb shadow
    const limb = ctx.createRadialGradient(cx, cy, r * 0.4, cx, cy, r);
    limb.addColorStop(0, 'rgba(0,0,0,0)');
    limb.addColorStop(0.8, 'rgba(0,0,0,0)');
    limb.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = limb;
    ctx.fill();
  }, [body, size]);
  return <canvas ref={ref} style={{ width: size + 'px', height: size + 'px', borderRadius: '50%' }} />;
}

function lighten(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.min(255, r + (255 - r) * amt)}, ${Math.min(255, g + (255 - g) * amt)}, ${Math.min(255, b + (255 - b) * amt)})`;
}
function darken(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${r * (1 - amt)}, ${g * (1 - amt)}, ${b * (1 - amt)})`;
}
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return [parseInt(hex.slice(0, 2), 16), parseInt(hex.slice(2, 4), 16), parseInt(hex.slice(4, 6), 16)];
}

// ─── LABEL LAYER (HTML labels over 3D bodies) ──────────────────
function LabelLayer({ sim, showLabels, selectedId, hoveredId }) {
  const [labels, setLabels] = useState([]);

  useEffect(() => {
    if (!sim || !showLabels) {
      setLabels([]);
      return;
    }
    let raf;
    const update = () => {
      const next = [];
      for (const data of window.SOL_DATA) {
        const pos = sim.getScreenPosition(data.id);
        if (!pos) continue;
        // Hide labels too close to camera or too far. In TRUE_SCALE mode the
        // whole system is ~3000 units wide so we need a much wider cutoff.
        const maxLabelDist = 8000;
        if (pos.distance > maxLabelDist) continue;
        // Hide sun label when zoomed in (we're nearly inside it)
        if (data.id === 'sun' && pos.distance < 30) continue;
        next.push({ id: data.id, name: data.name, type: data.type, x: pos.x, y: pos.y });
      }
      setLabels(next);
      raf = requestAnimationFrame(update);
    };
    raf = requestAnimationFrame(update);
    return () => cancelAnimationFrame(raf);
  }, [sim, showLabels]);

  if (!showLabels) return null;
  return (
    <div className="label-layer">
      {labels.map(l => (
        <div
          key={l.id}
          className={`body-label ${l.type === 'dwarf_planet' ? 'dwarf' : ''} ${selectedId === l.id ? 'selected' : ''}`}
          style={{ left: l.x + 'px', top: l.y + 'px' }}
        >
          {l.name}
        </div>
      ))}
    </div>
  );
}

// Human-readable time-rate formatter
function fmtSimSpeed(d) {
  if (d < 1/60) return (d * 24 * 60 * 60).toFixed(0) + ' s/s';
  if (d < 1/24) return (d * 24 * 60).toFixed(0) + ' min/s';
  if (d < 1) return (d * 24).toFixed(1) + ' hr/s';
  if (d < 7) return d.toFixed(2) + ' d/s';
  if (d < 30) return (d / 7).toFixed(1) + ' wk/s';
  if (d < 365) return (d / 30).toFixed(1) + ' mo/s';
  return (d / 365).toFixed(2) + ' yr/s';
}

const SPEED_MIN_LOG = -2;   // 0.01 d/s ≈ 14 min/s
const SPEED_MAX_LOG = 3;    // 1000 d/s ≈ 2.7 yr/s
const speedToSlider = (d) => ((Math.log10(d) - SPEED_MIN_LOG) / (SPEED_MAX_LOG - SPEED_MIN_LOG)) * 100;
const sliderToSpeed = (v) => Math.pow(10, SPEED_MIN_LOG + (v / 100) * (SPEED_MAX_LOG - SPEED_MIN_LOG));

const SPEED_PRESETS = [
  { label: '1 hr/s',  value: 1 / 24 },
  { label: '1 d/s',   value: 1 },
  { label: '1 wk/s',  value: 7 },
  { label: '1 mo/s',  value: 30 },
  { label: '1 yr/s',  value: 365 },
];

// ─── PHYSICS & THEORY PANEL (rendered inside RightPanel) ──────────
function PhysicsBlock({ bodyId, simDate }) {
  const Phys = window.Physics;
  const OM = window.OrbitalMechanics;
  if (!Phys || !Phys.PHYS[bodyId]) return null;

  // Live heliocentric distance for vis-viva / flux / gravitational pull
  let rAU = null;
  if (OM && OM.ELEMENTS[bodyId]) {
    const h = OM.planetHeliocentricAU(bodyId, simDate);
    if (h) rAU = Math.hypot(h.x, h.y, h.z);
  }
  const cards = Phys.bodyPhysics(bodyId, { rAU, date: simDate });
  if (!cards || !cards.length) return null;

  // Group cards by their .group field, preserving first-seen order
  const groups = [];
  const byName = {};
  for (const c of cards) {
    if (!byName[c.group]) { byName[c.group] = []; groups.push(c.group); }
    byName[c.group].push(c);
  }

  return (
    <div>
      <div className="panel-h">Physics &amp; Theory <span className="panel-h-tag">live · computed</span></div>
      <div className="phys-intro">Every value is computed live from first principles — formula and units shown.</div>
      {groups.map(gName => (
        <div className="phys-group" key={gName}>
          <div className="phys-group-title">{gName}</div>
          {byName[gName].map((c, i) => (
            <div className="phys-card" key={i}>
              <div className="phys-card-top">
                <span className="phys-label">{c.label}</span>
                <span className="phys-value">{c.value}<span className="phys-unit"> {c.unit}</span></span>
              </div>
              <div className="phys-formula">{c.formula}</div>
              {c.note && <div className="phys-note">{c.note}</div>}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── ORBITAL ELEMENTS PANEL (rendered inside RightPanel) ──────────
function OrbitalElementsBlock({ bodyId, simDate }) {
  const OM = window.OrbitalMechanics;
  if (!OM || !OM.ELEMENTS[bodyId]) return null;
  const el = OM.planetOrbitalElements(bodyId, simDate);
  if (!el) return null;
  const norm = (deg) => ((deg % 360) + 360) % 360;
  const wbar = norm(el.wbar);
  const Omeg = norm(el.Omega);
  const L    = norm(el.L);
  const M    = norm(L - wbar);
  const omegaArg = norm(wbar - Omeg);
  return (
    <div>
      <div className="panel-h">Keplerian Elements <span className="panel-h-tag">epoch · today</span></div>
      <div className="orbel-grid">
        <div className="orbel-row">
          <span className="orbel-key">a</span>
          <span className="orbel-val">{el.a.toFixed(5)}</span>
          <span className="orbel-sub">AU · semi-major axis</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">e</span>
          <span className="orbel-val">{el.e.toFixed(6)}</span>
          <span className="orbel-sub">eccentricity</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">i</span>
          <span className="orbel-val">{el.i.toFixed(3)}°</span>
          <span className="orbel-sub">inclination to ecliptic</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">Ω</span>
          <span className="orbel-val">{Omeg.toFixed(2)}°</span>
          <span className="orbel-sub">longitude of ascending node</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">ω</span>
          <span className="orbel-val">{omegaArg.toFixed(2)}°</span>
          <span className="orbel-sub">argument of perihelion</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">M</span>
          <span className="orbel-val">{M.toFixed(2)}°</span>
          <span className="orbel-sub">mean anomaly (today)</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">q</span>
          <span className="orbel-val">{(el.a * (1 - el.e)).toFixed(4)}</span>
          <span className="orbel-sub">AU · perihelion</span>
        </div>
        <div className="orbel-row">
          <span className="orbel-key">Q</span>
          <span className="orbel-val">{(el.a * (1 + el.e)).toFixed(4)}</span>
          <span className="orbel-sub">AU · aphelion</span>
        </div>
      </div>
    </div>
  );
}

// ─── COMPARE MODAL — multi-body comparative analysis ──────────────────
function CompareModal({ pinnedId, currentId, onClose }) {
  const lookup = (id) =>
    (window.SOL_DATA.find(b => b.id === id)) ||
    (window.DWARF_PLANETS && window.DWARF_PLANETS.find(b => b.id === id));

  const [extra, setExtra] = React.useState([]);
  const [logScale, setLogScale] = React.useState(false);
  const [picker, setPicker] = React.useState(false);

  if (!pinnedId || !currentId || pinnedId === currentId) return null;

  // ordered unique id list: pinned, current, then any extras
  const ids = [];
  [pinnedId, currentId, ...extra].forEach(id => { if (id && !ids.includes(id)) ids.push(id); });
  const bodies = ids.map(lookup).filter(Boolean);
  if (bodies.length < 2) return null;

  const fmtVal = (k, key) => {
    const v = k[key];
    if (key === 'mass') return v;
    if (typeof v !== 'number') return '—';
    if (key === 'diameterKm') return v.toLocaleString() + ' km';
    if (key === 'distanceAU') return v.toFixed(3) + ' AU';
    if (key === 'gravityMS2') return v.toFixed(2) + ' m/s²';
    if (key === 'densityGcc') return v.toFixed(2) + ' g/cm³';
    if (key === 'escapeVelKmS') return v.toFixed(1) + ' km/s';
    if (key === 'surfaceTempC') return v + ' °C';
    if (key === 'axialTiltDeg') return v.toFixed(1) + '°';
    if (key === 'rotationPeriodHours') return Math.abs(v).toFixed(1) + ' h';
    if (key === 'moons') return String(v || 0);
    return String(v);
  };
  const tableRows = [
    ['Diameter', 'diameterKm'], ['Mass', 'mass'], ['Distance · AU', 'distanceAU'],
    ['Gravity', 'gravityMS2'], ['Density', 'densityGcc'], ['Escape v', 'escapeVelKmS'],
    ['Surface T', 'surfaceTempC'],
    ['Orbital period', '__period'], ['Rotation', 'rotationPeriodHours'],
    ['Axial tilt', 'axialTiltDeg'], ['Moons', 'moons'],
  ];

  // candidate bodies to add (planets + dwarfs not already shown)
  const candidates = [...(window.SOL_DATA || []), ...(window.DWARF_PLANETS || [])]
    .filter(b => b.type !== 'star' && !ids.includes(b.id));

  const cols = `minmax(120px, 1.4fr) repeat(${bodies.length}, 1fr)`;

  return (
    <div className="lib-backdrop" onClick={onClose}>
      <div className="compare-modal compare-multi" onClick={e => e.stopPropagation()}>
        <div className="compare-multi-head">
          <div className="modal-cat">
            <span className="mc-no">N° CMP</span><span className="mc-line"></span><span>COMPARATIVE ANALYSIS · {bodies.length} BODIES</span>
          </div>
          <button className="lib-close" onClick={onClose} style={{ position: 'absolute', top: 16, right: 16 }}><Icon name="close" size={16} /></button>
          <div className="compare-chips">
            {bodies.map((bd, i) => (
              <div className="compare-chip" key={bd.id}>
                <span className="compare-chip-dot" style={{ background: bd.color }}></span>
                {bd.name}
                {i > 1 && <button className="compare-chip-x" onClick={() => setExtra(ex => ex.filter(x => x !== bd.id))}><Icon name="close" size={9} /></button>}
              </div>
            ))}
            {bodies.length < 4 && (
              <div className="compare-add-wrap">
                <button className="compare-add" onClick={() => setPicker(p => !p)}>+ Add body</button>
                {picker && (
                  <div className="compare-picker">
                    {candidates.map(c => (
                      <button key={c.id} className="compare-picker-item" onClick={() => { setExtra(ex => [...ex, c.id]); setPicker(false); }}>
                        <span className="compare-chip-dot" style={{ background: c.color }}></span>{c.name}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <CompareChart bodies={bodies} logScale={logScale} onToggleLog={() => setLogScale(l => !l)} />

        <div className="compare-grid-table" style={{ gridTemplateColumns: cols }}>
          <div className="cgt-cell cgt-corner"></div>
          {bodies.map(bd => (
            <div className="cgt-cell cgt-head" key={bd.id}>
              <span className="compare-chip-dot" style={{ background: bd.color }}></span>{bd.name}
            </div>
          ))}
          {tableRows.map(([label, key]) => (
            <React.Fragment key={label}>
              <div className="cgt-cell cgt-label">{label}</div>
              {bodies.map(bd => (
                <div className="cgt-cell cgt-val" key={bd.id + key}>
                  {key === '__period' ? window.fmtPeriod(bd.orbitalPeriodDays) : fmtVal(bd, key)}
                </div>
              ))}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── COMPARE CHART — multi-body normalised bars, linear or log ─────────
function CompareChart({ bodies, logScale, onToggleLog }) {
  const [chartType, setChartType] = React.useState('bars');
  const metrics = [
    { key: 'diameterKm',    label: 'Diameter',  unit: 'km',    fmt: v => Math.round(v).toLocaleString() },
    { key: 'gravityMS2',    label: 'Gravity',   unit: 'm/s²',  fmt: v => v.toFixed(2) },
    { key: 'densityGcc',    label: 'Density',   unit: 'g/cm³', fmt: v => v.toFixed(2) },
    { key: 'escapeVelKmS',  label: 'Escape v',  unit: 'km/s',  fmt: v => v.toFixed(1) },
    { key: 'distanceAU',    label: 'Distance',  unit: 'AU',    fmt: v => v.toFixed(2) },
    { key: 'moons',         label: 'Moons',     unit: '',      fmt: v => String(Math.round(v)) },
  ];
  const rows = metrics
    .map(m => ({ ...m, vals: bodies.map(b => b[m.key]) }))
    .filter(m => m.vals.every(v => typeof v === 'number') && m.vals.some(v => v > 0));

  const frac = (v, max) => {
    if (logScale) {
      const lv = Math.log10(Math.max(v, 0.001) + 1);
      const lm = Math.log10(max + 1) || 1;
      return lv / lm;
    }
    return v / (max || 1);
  };

  return (
    <div className="cmp-chart">
      <div className="cmp-chart-top">
        <div className="modal-cat" style={{ margin: 0 }}>
          <span className="mc-no">FIG. 1</span><span className="mc-line"></span><span>RELATIVE MAGNITUDE</span>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <div className="cmp-chart-seg">
            <button className={chartType === 'bars' ? 'on' : ''} onClick={() => setChartType('bars')}>BARS</button>
            <button className={chartType === 'radar' ? 'on' : ''} onClick={() => setChartType('radar')}>RADAR</button>
          </div>
          <button className={`cmp-scale-toggle ${logScale ? 'on' : ''}`} onClick={onToggleLog}>
            {logScale ? 'LOG' : 'LINEAR'}
          </button>
        </div>
      </div>
      <div className="cmp-chart-legend">
        {bodies.map(b => (
          <span className="cmp-leg" key={b.id}><span className="cmp-swatch" style={{ background: b.color }}></span>{b.name}</span>
        ))}
      </div>
      {chartType === 'radar' ? (
        <RadarChart bodies={bodies} rows={rows} frac={frac} />
      ) : rows.map(m => {
        const max = Math.max(...m.vals) || 1;
        return (
          <div className="cmp-metric" key={m.key}>
            <div className="cmp-metric-label">{m.label}</div>
            <div className="cmp-bars">
              {bodies.map((b, i) => (
                <div className="cmp-bar-row" key={b.id}>
                  <div className="cmp-bar-track">
                    <div className="cmp-bar-fill" style={{ width: (frac(m.vals[i], max) * 100) + '%', background: b.color }}></div>
                  </div>
                  <div className="cmp-bar-val">{m.fmt(m.vals[i])}<span className="u"> {m.unit}</span></div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── RADAR / SPIDER CHART — normalised polygon per body ────────────────
function RadarChart({ bodies, rows, frac }) {
  const size = 260, cx = size / 2, cy = size / 2 + 6, R = size * 0.34;
  const N = rows.length;
  if (N < 3) return <div className="cmp-radar-note">Radar needs at least 3 metrics.</div>;
  const ang = (i) => -Math.PI / 2 + i / N * Math.PI * 2;
  const pt = (i, f) => [cx + Math.cos(ang(i)) * R * f, cy + Math.sin(ang(i)) * R * f];
  const ringFracs = [0.25, 0.5, 0.75, 1];
  return (
    <svg className="cmp-radar" viewBox={`0 0 ${size} ${size}`} width="100%" style={{ maxWidth: 320, display: 'block', margin: '4px auto 0' }}>
      {ringFracs.map((rf, k) => (
        <polygon key={k}
          points={rows.map((_, i) => pt(i, rf).join(',')).join(' ')}
          fill="none" stroke="rgba(150,168,185,0.16)" strokeWidth="1" />
      ))}
      {rows.map((_, i) => {
        const [x, y] = pt(i, 1);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(150,168,185,0.14)" strokeWidth="1" />;
      })}
      {rows.map((m, i) => {
        const [x, y] = pt(i, 1.16);
        return <text key={i} x={x} y={y} fill="rgba(176,196,220,0.72)" fontSize="8.5"
          fontFamily="var(--font-mono)" textAnchor="middle" dominantBaseline="middle"
          style={{ letterSpacing: '0.08em', textTransform: 'uppercase' }}>{m.label}</text>;
      })}
      {bodies.map((b, bi) => {
        const pts = rows.map((m, i) => {
          const max = Math.max(...m.vals) || 1;
          return pt(i, Math.max(0.02, frac(m.vals[i], max)));
        });
        return (
          <polygon key={b.id}
            points={pts.map(p => p.join(',')).join(' ')}
            fill={b.color} fillOpacity="0.14"
            stroke={b.color} strokeWidth="1.6" strokeLinejoin="round" />
        );
      })}
    </svg>
  );
}

// ─── DATE PICKER ─────────────────────────────────────────
const _spacer1 = null;

// True when sim time tracks real "now" at ~real-time rate.
function isLiveNow(simDate, simSpeed) {
  if (!simDate) return false;
  const near = Math.abs(simDate.getTime() - Date.now()) < 5 * 60 * 1000;  // within 5 min
  const realRate = simSpeed && simSpeed < 1 / 1440;                        // ≤ ~1 min/s
  return near && realRate;
}

// ─── DEEP-LINK STATE (shareable URL hash) ────────────────────
const SHARE_MODES = ['hybrid', 'real_distance', 'real_size', 'true_scale'];
const SHARE = {
  parse() {
    const h = (location.hash || '').replace(/^#/, '');
    if (!h) return null;
    const p = new URLSearchParams(h);
    const out = {};
    const m = p.get('m'); if (m && SHARE_MODES.includes(m)) out.mode = m;
    const b = p.get('b'); if (b) out.selectedId = b;
    const x = parseFloat(p.get('x')); if (!isNaN(x)) out.magnify = Math.max(1, Math.min(20, x));
    const d = p.get('d'); if (d) out.date = d;
    return Object.keys(out).length ? out : null;
  },
  _str(parts) {
    const p = new URLSearchParams();
    if (parts.mode) p.set('m', parts.mode);
    if (parts.selectedId) p.set('b', parts.selectedId);
    if (parts.magnify != null) p.set('x', String(Math.round(parts.magnify * 10) / 10));
    if (parts.date) p.set('d', parts.date);
    return p.toString();
  },
  write(parts) {
    const s = this._str(parts);
    history.replaceState(null, '', s ? ('#' + s) : (location.pathname + location.search));
  },
  link(parts) {
    return location.origin + location.pathname + location.search + '#' + this._str(parts);
  },
};

// ─── POSTCARD EXPORT (canvas snapshot + tasteful caption) ─────
function savePostcard(sim, opts) {
  if (!sim || !sim.renderer) return;
  opts = opts || {};
  try { sim.renderer.render(sim.scene, sim.camera); } catch (e) {}
  const src = sim.renderer.domElement;
  const w = src.width, h = src.height;
  if (!w || !h) return;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  ctx.drawImage(src, 0, 0, w, h);

  const k = w / 1920;                       // scale type to a 1080p reference
  const padX = 54 * k, baseY = h - 48 * k;
  // bottom scrim so the caption always reads
  const grad = ctx.createLinearGradient(0, h - 240 * k, 0, h);
  grad.addColorStop(0, 'rgba(3,8,20,0)');
  grad.addColorStop(1, 'rgba(3,8,20,0.66)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, h - 240 * k, w, 240 * k);
  // brand reticle mark — gold ring + cyan node + core (matches app identity)
  const cx = padX + 16 * k, cy = baseY - 20 * k;
  ctx.save();
  ctx.strokeStyle = 'rgba(216,179,106,0.85)'; ctx.lineWidth = 1.6 * k;
  ctx.beginPath(); ctx.arc(cx, cy, 16 * k, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(150,170,185,0.5)'; ctx.lineWidth = 1 * k;
  ctx.beginPath(); ctx.arc(cx, cy, 9 * k, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#D8B36A';
  ctx.beginPath(); ctx.arc(cx, cy, 3 * k, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#62D9EA';
  ctx.beginPath(); ctx.arc(cx, cy - 16 * k, 2 * k, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // brand text
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(232,238,245,0.96)';
  ctx.font = `700 ${26 * k}px "Space Grotesk", "Space Mono", monospace`;
  ctx.fillText('SOLAR 3D', padX + 44 * k, baseY - 22 * k);
  ctx.fillStyle = 'rgba(176,196,220,0.8)';
  ctx.font = `${13 * k}px "Space Mono", monospace`;
  ctx.fillText('TRUE SCALE OBSERVATORY', padX + 44 * k, baseY);
  // right caption: subject + date
  ctx.textAlign = 'right';
  if (opts.subject) {
    ctx.fillStyle = 'rgba(220,235,255,0.96)';
    ctx.font = `700 ${24 * k}px "Space Mono", monospace`;
    ctx.fillText(opts.subject, w - padX, baseY - 22 * k);
  }
  if (opts.date) {
    ctx.fillStyle = 'rgba(240,184,64,0.9)';
    ctx.font = `${14 * k}px "Space Mono", monospace`;
    ctx.fillText(opts.date, w - padX, baseY);
  }
  ctx.textAlign = 'left';

  out.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const name = (opts.subject || 'view').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    a.href = url; a.download = `solar3d-${name || 'view'}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }, 'image/png');
}
