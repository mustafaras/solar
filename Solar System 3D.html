<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --bg-void: #030814;
  --bg-deep: #060E1C;
  --bg-panel: rgba(6, 14, 30, 0.78);
  --bg-panel-solid: rgba(6, 14, 30, 0.96);
  --glass-border: rgba(0, 160, 220, 0.18);
  --glass-border-bright: rgba(0, 200, 255, 0.42);
  --cyan: #00CFEA;
  --cyan-dim: rgba(0, 207, 234, 0.55);
  --cyan-deep: #008CB0;
  --amber: #F0B840;
  --amber-dim: rgba(240, 184, 64, 0.6);
  --red-warn: #F26B5C;
  --text-primary: rgba(220, 235, 255, 0.97);
  --text-secondary: rgba(160, 195, 230, 0.82);
  --text-muted: rgba(110, 150, 195, 0.7);
  --text-data: #A8E4F0;
  --font-mono: 'Space Mono', 'Courier New', monospace;
  --font-ui: 'Outfit', 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-ui);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(0, 30, 60, 0.4); }
::-webkit-scrollbar-thumb { background: rgba(0, 150, 200, 0.3); border-radius: 2px; }

/* ============================================================
   CANVAS (full viewport, behind UI)
============================================================ */
#three-container {
  position: fixed; inset: 0;
  z-index: 0;
}

/* ============================================================
   UI OVERLAY GRID
============================================================ */
#ui-root {
  position: fixed; inset: 0;
  z-index: 10;
  display: grid;
  grid-template-rows: 56px 1fr 66px;
  grid-template-columns: 270px 1fr 320px;
  grid-template-areas:
    "toolbar toolbar toolbar"
    "left    middle  right"
    "bottom  bottom  bottom";
  pointer-events: none;
}
#ui-root > * { pointer-events: auto; }

#ui-root:has(.lib-backdrop),
#ui-root:has(.cmdk-backdrop) {
  z-index: 500;
}

.middle-area {
  grid-area: middle;
  position: relative;
}
/* Higher specificity to beat `#ui-root > *` — events fall through to canvas */
#ui-root > .middle-area { pointer-events: none; }
.middle-area > * { pointer-events: auto; }

/* ============================================================
   TOOLBAR
============================================================ */
#toolbar {
  grid-area: toolbar;
  display: flex; align-items: center; gap: 14px;
  padding: 0 18px;
  background: linear-gradient(180deg, rgba(4, 10, 24, 0.95), rgba(4, 10, 24, 0.75));
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(14px);
}

.brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.brand-logo {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #FFE566, #FF8C00 60%, #993300);
  box-shadow: 0 0 14px rgba(255, 150, 30, 0.5);
  position: relative;
}
.brand-logo::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid rgba(0, 207, 234, 0.4);
}
.brand-text {
  display: flex; flex-direction: column; line-height: 1;
}
.brand-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--cyan);
  text-transform: uppercase;
}
.brand-tag {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 3px;
}

.toolbar-sep {
  width: 1px; height: 26px;
  background: var(--glass-border);
  flex-shrink: 0;
}

.mode-tabs {
  display: flex; gap: 2px;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 7px;
  padding: 2px;
  flex-shrink: 0;
}
.mode-tab {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: none; border-radius: 5px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.mode-tab:hover {
  color: var(--text-secondary);
  background: rgba(0, 100, 160, 0.25);
}
.mode-tab.active {
  background: var(--cyan);
  color: #030814;
  box-shadow: 0 0 12px rgba(0, 207, 234, 0.35);
}

.search-wrap {
  flex: 1; max-width: 240px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 12px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: rgba(0, 18, 44, 0.55);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 7px 8px 7px 30px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--glass-border-bright); }
.search-input::placeholder { color: var(--text-muted); }

.search-results {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 6px;
  margin-top: 4px;
  overflow: hidden;
  z-index: 999;
}
.search-result-item {
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  transition: background 0.1s;
}
.search-result-item:hover { background: rgba(0, 150, 200, 0.18); color: var(--cyan); }
.search-result-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 4px rgba(255,255,255,0.2);
}

.toolbar-spacer { flex: 1; }

.tool-btn {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 7px 12px;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-btn:hover {
  border-color: var(--glass-border-bright);
  color: var(--cyan);
}
.tool-btn.primary {
  border-color: var(--cyan-dim);
  color: var(--cyan);
}
.tool-btn.primary:hover {
  background: rgba(0, 207, 234, 0.1);
}

/* ============================================================
   LEFT PANEL
============================================================ */
#left-panel {
  grid-area: left;
  background: var(--bg-panel);
  border-right: 1px solid var(--glass-border);
  backdrop-filter: blur(16px);
  overflow-y: auto;
  padding: 18px 16px;
  display: flex; flex-direction: column; gap: 22px;
}

.panel-h {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cyan-dim);
  margin-bottom: 10px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; gap: 7px;
}
.panel-h-tag {
  font-family: var(--font-mono);
  font-size: 7px;
  color: var(--amber);
  background: rgba(240, 184, 64, 0.12);
  border: 1px solid rgba(240, 184, 64, 0.25);
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: 0.1em;
  margin-left: auto;
}

.scale-info {
  background: rgba(0, 22, 50, 0.5);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 12px 13px;
}
.scale-info-title {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.scale-info-text {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}

.toggle-group { display: flex; flex-direction: column; gap: 6px; }
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 11px;
  background: rgba(0, 18, 44, 0.45);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.14s;
  user-select: none;
}
.toggle-row:hover {
  border-color: var(--glass-border-bright);
  background: rgba(0, 38, 78, 0.55);
}
.toggle-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
}
.toggle-switch {
  width: 28px; height: 15px;
  background: rgba(0, 50, 100, 0.7);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  position: relative;
  transition: background 0.15s;
  flex-shrink: 0;
}
.toggle-switch.on {
  background: var(--cyan);
  border-color: var(--cyan);
}
.toggle-knob {
  position: absolute;
  width: 9px; height: 9px;
  background: rgba(180, 220, 255, 0.7);
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.15s, background 0.15s;
}
.toggle-switch.on .toggle-knob {
  transform: translateX(13px);
  background: #030814;
}

.slider-row { display: flex; flex-direction: column; gap: 5px; }
.slider-row-label {
  display: flex; justify-content: space-between; align-items: center;
}
.slider-label-text {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
}
.slider-val {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--amber);
  font-weight: 700;
}
.range-input {
  -webkit-appearance: none;
  width: 100%; height: 3px;
  background: rgba(0, 80, 140, 0.5);
  border-radius: 2px;
  outline: none;
}
.range-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--amber);
  border-radius: 50%;
  cursor: pointer;
}
.range-input.cyan-thumb::-webkit-slider-thumb { background: var(--cyan); }

.planet-list { display: flex; flex-direction: column; gap: 3px; }
.planet-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
}
.planet-row:hover {
  background: rgba(0, 50, 100, 0.4);
  border-color: var(--glass-border);
}
.planet-row.selected {
  background: rgba(0, 100, 160, 0.3);
  border-color: var(--glass-border-bright);
}
.planet-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(255,255,255,0.15);
}
.planet-name {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
  flex: 1;
}
.planet-row.selected .planet-name { color: var(--cyan); }
.planet-au {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
}
.dwarf-tag {
  font-family: var(--font-mono);
  font-size: 7px;
  color: var(--amber);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.edu-block {
  background: rgba(0, 22, 50, 0.55);
  border: 1px solid rgba(0, 140, 190, 0.15);
  border-radius: 7px;
  padding: 11px 12px;
}
.edu-q {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  color: var(--cyan-dim);
  letter-spacing: 0.05em;
  margin-bottom: 5px;
}
.edu-a {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.55;
}

/* ============================================================
   RIGHT PANEL
============================================================ */
#right-panel {
  grid-area: right;
  width: 320px;
  justify-self: end;
  background: var(--bg-panel);
  border-left: 1px solid var(--glass-border);
  backdrop-filter: blur(16px);
  overflow-y: auto;
  padding: 18px 16px;
  display: flex; flex-direction: column; gap: 16px;
  transition: transform 0.34s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Collapsed state: panel slides off-screen, grid reclaims the space ── */
#ui-root.right-collapsed {
  grid-template-columns: 270px 1fr 0;
}
#ui-root.right-collapsed #right-panel {
  transform: translateX(calc(100% + 2px));
  pointer-events: none;
}

/* ── Edge toggle tab (always present) ── */
.right-toggle {
  position: fixed;
  top: 50%;
  right: 320px;
  transform: translateY(-50%);
  z-index: 12;
  width: 22px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-right: none;
  border-radius: 9px 0 0 9px;
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 15px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: right 0.34s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s, color 0.15s;
  pointer-events: auto;
}
.right-toggle:hover {
  background: rgba(0, 60, 110, 0.7);
  color: #fff;
}
#ui-root.right-collapsed .right-toggle,
.right-toggle.collapsed {
  right: 0;
  border-radius: 9px 0 0 9px;
}
@media (max-width: 900px) {
  .right-toggle { display: none; }
}

.no-sel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 14px;
  text-align: center;
  padding: 20px;
}
.no-sel-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(0, 40, 80, 0.5);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  color: var(--cyan-dim);
}
.no-sel-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.no-sel-text {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.55;
  max-width: 200px;
}

.body-head {
  display: flex; align-items: flex-start; gap: 14px;
}
.body-thumb {
  flex-shrink: 0;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0, 150, 220, 0.25);
}
.body-title-block { flex: 1; min-width: 0; }
.body-name-lg {
  font-family: var(--font-mono);
  font-size: 19px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1.05;
}
.body-pill {
  display: inline-block;
  margin-top: 5px;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.pill-star { background: rgba(255, 180, 0, 0.18); color: #FFB800; border: 1px solid rgba(255, 184, 0, 0.3); }
.pill-planet { background: rgba(0, 150, 220, 0.18); color: var(--cyan); border: 1px solid rgba(0, 150, 220, 0.3); }
.pill-dwarf_planet { background: rgba(240, 184, 64, 0.15); color: var(--amber); border: 1px solid rgba(240, 184, 64, 0.3); }

.body-quick-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
}
.qa-btn {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 8px;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 4px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.14s;
  flex: 1;
}
.qa-btn:hover {
  border-color: var(--glass-border-bright);
  color: var(--cyan);
}

.data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.data-cell {
  background: rgba(0, 18, 44, 0.55);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 9px 10px;
}
.data-cell.wide { grid-column: 1 / -1; }
.data-cell-label {
  font-family: var(--font-mono);
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}
.data-cell-value {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-data);
  font-weight: 700;
  line-height: 1.15;
}
.data-cell-value.sm { font-size: 11px; }
.data-cell-value.xs { font-size: 10.5px; word-break: break-word; }
.data-cell-sub {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--text-muted);
  margin-top: 3px;
}

.desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.facts {
  display: flex; flex-direction: column; gap: 7px;
}
.fact {
  display: flex; gap: 9px;
  align-items: flex-start;
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.fact-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cyan-dim);
  flex-shrink: 0; margin-top: 6px;
}

/* ───── Moons section ───── */
.moon-list {
  display: flex; flex-direction: column;
  gap: 8px;
}
.moon-card {
  background: rgba(0, 18, 44, 0.55);
  border: 1px solid var(--glass-border);
  border-radius: 7px;
  padding: 10px 11px;
}
.moon-card-head {
  display: flex; align-items: center; gap: 9px;
}
.moon-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 5px rgba(255,255,255,0.15), inset 0 0 4px rgba(0,0,0,0.4);
}
.moon-name {
  font-family: var(--font-mono);
  font-size: 11.5px; font-weight: 700;
  color: var(--text-primary);
  flex: 1;
}
.moon-diam {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--cyan-dim);
}
.moon-orbit {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin: 5px 0 6px;
  letter-spacing: 0.02em;
}
.moon-desc {
  font-size: 10.5px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============================================================
   BOTTOM BAR
============================================================ */
#bottom-bar {
  grid-area: bottom;
  display: flex; align-items: center; gap: 16px;
  padding: 0 18px;
  background: linear-gradient(0deg, rgba(4, 10, 24, 0.95), rgba(4, 10, 24, 0.75));
  border-top: 1px solid var(--glass-border);
  backdrop-filter: blur(14px);
}

.bb-section { display: flex; align-items: center; gap: 10px; }

.play-btn {
  width: 34px; height: 34px;
  background: var(--cyan);
  border: none;
  border-radius: 6px;
  color: #030814;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 12px rgba(0, 207, 234, 0.3);
  transition: all 0.15s;
  flex-shrink: 0;
}
.play-btn:hover { transform: scale(1.05); }
.play-btn.paused { background: var(--amber); box-shadow: 0 0 12px rgba(240, 184, 64, 0.3); }

.bb-label {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
}

.bb-speed-slider {
  -webkit-appearance: none;
  width: 110px; height: 3px;
  background: rgba(0, 80, 140, 0.5);
  border-radius: 2px;
  outline: none;
}
.bb-speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--cyan);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0, 207, 234, 0.6);
}

.bb-pill {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 11px;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.bb-pill.date {
  background: rgba(0, 100, 160, 0.3);
  border: 1px solid rgba(0, 150, 220, 0.3);
  color: var(--cyan);
}
.bb-pill.zoom {
  background: rgba(0, 50, 100, 0.4);
  border: 1px solid var(--glass-border);
  color: var(--text-data);
}
.bb-pill.mode {
  background: rgba(240, 184, 64, 0.15);
  border: 1px solid rgba(240, 184, 64, 0.3);
  color: var(--amber);
}
.bb-pill.follow {
  background: rgba(0, 207, 234, 0.18);
  border: 1px solid rgba(0, 207, 234, 0.5);
  color: var(--cyan);
  box-shadow: 0 0 12px rgba(0, 207, 234, 0.2);
}

.speed-presets {
  display: flex; gap: 2px;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 2px;
}
.speed-preset-btn {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 4px 7px;
  border: none; border-radius: 4px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.13s;
  white-space: nowrap;
}
.speed-preset-btn:hover { color: var(--cyan); background: rgba(0, 100, 160, 0.25); }
.speed-preset-btn.active {
  background: var(--cyan);
  color: #030814;
}

.speed-readout {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  color: var(--cyan);
  min-width: 56px;
  text-align: right;
}

/* Keyboard help overlay */
.kbd-help {
  position: absolute;
  bottom: 14px; right: 14px;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 12px 14px;
  z-index: 6;
  min-width: 240px;
  max-width: 280px;
  backdrop-filter: blur(12px);
}
.kbd-help-section {
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--amber-dim);
  margin: 10px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(240, 184, 64, 0.15);
}
.kbd-help-section:first-of-type { margin-top: 4px; }
.kbd-help-title {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 9px;
  display: flex; align-items: center; gap: 8px;
}
.kbd-help-close {
  margin-left: auto;
  background: transparent; border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 0; line-height: 1;
}
.kbd-help-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
  margin-bottom: 5px;
  font-family: var(--font-mono);
  font-size: 9.5px;
}
.kbd-help-keys { display: flex; gap: 3px; }
.kbd-key {
  background: rgba(0, 50, 100, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 8.5px;
  color: var(--text-secondary);
  min-width: 16px;
  text-align: center;
}
.kbd-help-desc { color: var(--text-secondary); }

.kbd-help-toggle {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 32px; height: 32px;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--cyan);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  z-index: 6;
  transition: all 0.14s;
  backdrop-filter: blur(10px);
}
.kbd-help-toggle:hover { border-color: var(--glass-border-bright); }

.bb-spacer { flex: 1; }

.bb-credit {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* ============================================================
   FLOATING LABELS (planet labels in 3D space)
============================================================ */
.label-layer {
  /* Must overlay the full canvas (not just the middle grid cell) since
     getScreenPosition() returns viewport-relative pixel coords. Otherwise
     labels drift by the left-panel + toolbar offsets. */
  position: fixed; inset: 0;
  z-index: 5;
  pointer-events: none;
}
.body-label {
  position: absolute;
  transform: translate(-50%, 8px);
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: rgba(220, 235, 255, 0.85);
  text-shadow: 0 1px 3px rgba(0,0,0,0.95);
  white-space: nowrap;
  letter-spacing: 0.06em;
  pointer-events: none;
  transition: opacity 0.2s;
}
.body-label.dwarf { color: rgba(240, 184, 64, 0.9); }
.body-label.selected {
  color: var(--cyan);
  font-weight: 700;
}
.body-label::before {
  content: '';
  display: block;
  width: 1px; height: 8px;
  background: linear-gradient(to bottom, rgba(0,207,234,0.6), transparent);
  margin: 0 auto 2px;
}

/* ============================================================
   SCALE DISCLAIMER
============================================================ */
.scale-disclaimer {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  background: rgba(5, 15, 35, 0.85);
  border: 1px solid rgba(240, 184, 64, 0.3);
  border-radius: 18px;
  padding: 5px 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--amber);
  letter-spacing: 0.05em;
  max-width: calc(100% - 24px);
  text-align: center;
  backdrop-filter: blur(8px);
  pointer-events: none;
  z-index: 5;
}

/* ============================================================
   TOUR PANEL (cinematic mode)
============================================================ */
#tour-panel {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 14px;
  z-index: 6;
  width: min(360px, calc(100% - 32px));
  backdrop-filter: blur(12px);
}
.tour-step-info {
  display: flex; flex-direction: column; gap: 3px;
  flex: 1;
}
.tour-step-label {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--cyan-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.tour-step-name {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  color: var(--cyan);
}
.tour-progress {
  height: 2px;
  background: rgba(0, 80, 140, 0.4);
  border-radius: 1px;
  overflow: hidden;
  margin-top: 5px;
}
.tour-progress-fill {
  height: 100%;
  background: var(--cyan);
  transition: width 0.3s ease;
}

/* ============================================================
   LOADING SPLASH
============================================================ */
#splash {
  position: fixed;
  inset: 0;
  background: var(--bg-void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  z-index: 1000;
  transition: opacity 0.6s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-orbit {
  width: 120px; height: 120px;
  position: relative;
}
.splash-orbit::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(0, 207, 234, 0.3);
}
.splash-sun {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #FFE566, #FF8C00 60%, #993300);
  box-shadow: 0 0 30px rgba(255, 150, 30, 0.8);
}
.splash-planet {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  margin: -4px 0 0 -4px;
  transform-origin: 0 0;
  animation: splashOrbit 2s linear infinite;
}
@keyframes splashOrbit {
  0% { transform: rotate(0deg) translateX(58px); }
  100% { transform: rotate(360deg) translateX(58px); }
}
.splash-title {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
}
.splash-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Mobile fallback */
/* ============================================================
   MOBILE — bottom-sheet layout (panels become drag-up sheets)
============================================================ */
.mobile-fabs { display: none; }
.mobile-scrim { display: none; }

@media (max-width: 900px) {
  #ui-root {
    grid-template-columns: 0 1fr 0;
    grid-template-rows: 52px 1fr 60px;
  }

  /* Toolbar: horizontal scroll, condensed */
  #toolbar { overflow-x: auto; overflow-y: hidden; gap: 6px; padding: 0 12px; -webkit-overflow-scrolling: touch; }
  #toolbar::-webkit-scrollbar { display: none; }
  .brand-tag { display: none; }
  .tool-btn span:not(.kbd-chip) { display: none; }   /* icon-only buttons */
  .tool-btn .kbd-chip { display: none; }
  .tool-btn { padding: 0 9px; flex-shrink: 0; }
  .mode-tabs { flex-shrink: 0; }
  .toolbar-spacer { display: none; }
  #toolbar .search-wrap { display: none; }

  /* Panels become bottom sheets */
  #left-panel, #right-panel {
    display: flex; flex-direction: column;
    position: fixed; left: 0; right: 0; bottom: 0;
    width: auto; max-width: none;
    height: auto; max-height: 62vh;
    border-radius: 16px 16px 0 0;
    border: 1px solid var(--glass-border);
    border-bottom: none;
    box-shadow: 0 -20px 50px -20px rgba(0,0,0,0.85), inset 0 1px 0 var(--edge-in);
    transform: translateY(102%);
    transition: transform 0.34s var(--ease);
    z-index: 120;
    padding-top: 22px;
  }
  /* drag handle */
  #left-panel::before, #right-panel::before {
    content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 38px; height: 4px; border-radius: 3px; background: var(--text-muted); opacity: 0.5;
  }
  #ui-root.mobile-bodies-open #left-panel { transform: translateY(0); }
  /* Right panel (detail) auto-shows when a body is selected (not collapsed) */
  #right-panel { transform: translateY(102%); }
  #ui-root.has-selection:not(.right-collapsed) #right-panel { transform: translateY(0); }
  .right-toggle { display: none; }

  .mobile-scrim {
    display: block; position: fixed; inset: 0; z-index: 110;
    background: rgba(2,4,10,0.5); backdrop-filter: blur(2px);
    animation: cmdkFade .2s var(--ease) both;
  }

  /* Floating action buttons */
  .mobile-fabs {
    display: flex; flex-direction: column; gap: 10px;
    position: fixed; right: 14px; bottom: 74px; z-index: 130;
    pointer-events: auto;
  }
  .mobile-fab {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-panel-solid);
    border: 1px solid var(--glass-border-bright);
    color: var(--accent-bright);
    box-shadow: 0 10px 26px -10px rgba(0,0,0,0.8), inset 0 1px 0 var(--edge-in);
    cursor: pointer;
  }
  .mobile-fab:active { transform: scale(0.94); }

  /* Bottom bar condenses */
  #bottom-bar { overflow-x: auto; gap: 10px; padding: 0 12px; }
  #bottom-bar::-webkit-scrollbar { display: none; }
  .bb-label { display: none; }
  .toolbar-sep { display: none; }

  /* Modals fill the screen on mobile */
  .lib-backdrop { padding: 12px; }
  .lib-modal { max-height: calc(100vh - 24px); border-radius: 14px; }
  .lib-body-grid, .lib-mission-list, .lib-glossary, .lib-ref-grid { grid-template-columns: 1fr; }
  .compare-modal, .moon-modal { width: 100%; }
  .cmp-metric { grid-template-columns: 70px 1fr; gap: 8px; }
  .cmp-bar-val { width: 72px; font-size: 10px; }
}

/* ============================================================
   LIBRARY MODAL — premium reference panel
============================================================ */
.lib-backdrop {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, rgba(2,6,18,0.85), rgba(2,6,18,0.95));
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
  animation: libFadeIn 0.3s ease;
}
@keyframes libFadeIn { from { opacity: 0; } to { opacity: 1; } }

.lib-modal {
  width: 100%;
  max-width: 1280px;
  height: 100%;
  max-height: calc(100vh - 64px);
  background: linear-gradient(180deg, rgba(8,16,32,0.98), rgba(4,10,22,0.99));
  border: 1px solid var(--glass-border-bright);
  border-radius: 16px;
  box-shadow:
    0 30px 80px rgba(0, 0, 0, 0.7),
    inset 0 1px 0 rgba(120, 200, 255, 0.08);
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
  animation: libSlideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes libSlideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.lib-header {
  padding: 24px 32px 20px;
  border-bottom: 1px solid var(--glass-border);
  background: linear-gradient(180deg, rgba(0, 60, 110, 0.15), transparent);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 24px;
}
.lib-header-text {
  flex: 1; min-width: 0;
}
.lib-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.lib-eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: libPulse 2s ease-in-out infinite;
}
@keyframes libPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
.lib-title {
  font-family: var(--font-mono);
  font-size: 30px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.01em;
  line-height: 1;
  margin-bottom: 8px;
}
.lib-subtitle {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.55;
  max-width: 760px;
}
.lib-close {
  width: 38px; height: 38px;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.lib-close:hover {
  border-color: var(--red-warn);
  color: var(--red-warn);
}

.lib-tabs {
  display: flex;
  gap: 4px;
  padding: 0 32px;
  border-bottom: 1px solid var(--glass-border);
  background: rgba(0, 12, 28, 0.4);
  overflow-x: auto;
}
.lib-tab {
  font-family: var(--font-mono);
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 14px 18px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
.lib-tab-count {
  font-size: 9px;
  background: rgba(0, 80, 130, 0.4);
  color: var(--text-secondary);
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0;
}
.lib-tab:hover { color: var(--text-secondary); }
.lib-tab.active { color: var(--cyan); }
.lib-tab.active::after {
  content: '';
  position: absolute;
  left: 18px; right: 18px; bottom: -1px;
  height: 2px;
  background: var(--cyan);
  border-radius: 1px 1px 0 0;
  box-shadow: 0 0 10px rgba(0, 207, 234, 0.5);
}

.lib-body {
  overflow-y: auto;
  padding: 28px 32px 36px;
}

/* Search bar inside library */
.lib-search {
  position: relative;
  margin-bottom: 22px;
  max-width: 480px;
}
.lib-search-icon {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 13px;
  pointer-events: none;
}
.lib-search-input {
  width: 100%;
  background: rgba(0, 18, 44, 0.55);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 11px 12px 11px 36px;
  outline: none;
}
.lib-search-input:focus { border-color: var(--glass-border-bright); }
.lib-search-input::placeholder { color: var(--text-muted); }

/* ─── Bodies tab grid ─── */
.lib-body-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.lib-body-card {
  background: rgba(0, 22, 50, 0.5);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  transition: all 0.15s;
}
.lib-body-card:hover {
  border-color: var(--glass-border-bright);
  background: rgba(0, 38, 78, 0.5);
}
.lib-body-card-head {
  display: flex; align-items: center; gap: 12px;
}
.lib-body-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(0, 150, 220, 0.18), inset 0 0 6px rgba(0,0,0,0.4);
}
.lib-body-card-title {
  font-family: var(--font-mono);
  font-size: 16px; font-weight: 700;
  color: var(--text-primary);
}
.lib-body-card-type {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--cyan-dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 3px;
}
.lib-body-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
}
.lib-body-stat {
  display: flex; flex-direction: column;
  gap: 2px;
}
.lib-body-stat-label {
  color: var(--text-muted);
  text-transform: uppercase;
  font-size: 8px;
  letter-spacing: 0.12em;
}
.lib-body-stat-val {
  color: var(--text-data);
  font-weight: 700;
}
.lib-body-card-desc {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.55;
  margin-top: 4px;
}
.lib-body-card-links {
  display: flex; gap: 6px;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--glass-border);
  flex-wrap: wrap;
}
.lib-ext-link {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 9px;
  background: rgba(0, 18, 44, 0.7);
  border: 1px solid var(--glass-border);
  border-radius: 5px;
  color: var(--cyan);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.14s;
}
.lib-ext-link:hover {
  border-color: var(--cyan);
  background: rgba(0, 207, 234, 0.12);
}
.lib-ext-link svg, .lib-ext-link .icon { width: 9px; height: 9px; }

/* ─── Missions list ─── */
.lib-mission-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 14px;
}
.lib-mission-card {
  background: rgba(0, 22, 50, 0.5);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 8px;
}
.lib-mission-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px;
}
.lib-mission-name {
  font-family: var(--font-mono);
  font-size: 15px; font-weight: 700;
  color: var(--cyan);
}
.lib-mission-years {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.lib-mission-meta {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.lib-mission-meta strong { color: var(--text-secondary); font-weight: 700; }
.lib-mission-status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: rgba(0, 200, 130, 0.15);
  color: #5BE3A3;
  border: 1px solid rgba(0, 200, 130, 0.3);
}
.lib-mission-status.done {
  background: rgba(160, 160, 180, 0.12);
  color: #B0B6C5;
  border-color: rgba(160, 160, 180, 0.25);
}
.lib-mission-status.transit {
  background: rgba(240, 184, 64, 0.15);
  color: var(--amber);
  border-color: rgba(240, 184, 64, 0.3);
}
.lib-mission-blurb {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-top: 2px;
}
.lib-mission-targets {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* ─── Concepts list ─── */
.lib-concept-list {
  display: flex; flex-direction: column; gap: 12px;
  max-width: 880px;
}
.lib-concept-card {
  background: rgba(0, 22, 50, 0.45);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 18px 22px;
  transition: all 0.15s;
}
.lib-concept-card:hover {
  border-color: var(--glass-border-bright);
  background: rgba(0, 38, 78, 0.5);
}
.lib-concept-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 14px;
  margin-bottom: 9px;
}
.lib-concept-title {
  font-family: var(--font-mono);
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
}
.lib-concept-cat {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--amber-dim);
  white-space: nowrap;
}
.lib-concept-body {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.lib-concept-link {
  display: inline-block;
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cyan);
  text-decoration: none;
  letter-spacing: 0.05em;
}
.lib-concept-link:hover { text-decoration: underline; }

/* ─── Glossary ─── */
.lib-glossary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 12px;
  max-width: 1100px;
}
.lib-gloss-item {
  background: rgba(0, 22, 50, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 12px 14px;
}
.lib-gloss-term {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700;
  color: var(--cyan);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}
.lib-gloss-defn {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}

/* ─── Timeline ─── */
.lib-timeline {
  position: relative;
  padding-left: 32px;
  max-width: 880px;
}
.lib-timeline::before {
  content: '';
  position: absolute;
  left: 12px; top: 4px; bottom: 4px;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--glass-border-bright), transparent);
}
.lib-timeline-item {
  position: relative;
  padding: 6px 0 14px;
}
.lib-timeline-item::before {
  content: '';
  position: absolute;
  left: -25px; top: 11px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px rgba(0, 207, 234, 0.5);
}
.lib-timeline-year {
  font-family: var(--font-mono);
  font-size: 14px; font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.lib-timeline-event {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}

/* ─── References ─── */
.lib-refs {
  display: flex; flex-direction: column;
  gap: 28px;
}
.lib-ref-section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--glass-border);
}
.lib-ref-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 10px;
}
.lib-ref-link {
  background: rgba(0, 22, 50, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 13px 15px;
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
  display: block;
}
.lib-ref-link:hover {
  border-color: var(--cyan);
  background: rgba(0, 207, 234, 0.06);
}
.lib-ref-link-name {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px;
}
.lib-ref-link-name::after {
  content: '↗';
  font-size: 10px;
  opacity: 0.6;
  margin-left: auto;
}
.lib-ref-link-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.lib-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 0.06em;
}

/* ─── Date picker popover ─── */
.date-popover {
  position: absolute;
  bottom: 36px; left: 0;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 12px;
  min-width: 220px;
  z-index: 20;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}
.date-popover-section {
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cyan-dim);
  margin: 6px 0 6px;
}
.date-popover-section:first-child { margin-top: 0; }
.date-popover-input {
  width: 100%;
  background: rgba(0, 18, 44, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 7px 9px;
  outline: none;
  color-scheme: dark;
}
.date-popover-input:focus { border-color: var(--glass-border-bright); }
.date-popover-presets {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
}
.date-popover-preset {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.05em;
  background: rgba(0, 50, 100, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 4px;
  color: var(--text-secondary);
  padding: 5px 4px;
  cursor: pointer;
  transition: all 0.14s;
}
.date-popover-preset:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* ─── Orbital elements ─── */
.orbel-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
}
.orbel-row {
  display: grid;
  grid-template-columns: 24px 90px 1fr;
  align-items: center;
  gap: 12px;
  padding: 6px 11px;
  background: rgba(0, 18, 44, 0.45);
  border: 1px solid var(--glass-border);
  border-radius: 5px;
}
.orbel-key {
  font-family: var(--font-mono);
  font-size: 14px; font-weight: 700;
  color: var(--amber);
  text-align: center;
}
.orbel-val {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-data);
  font-weight: 700;
}
.orbel-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* ─── Physics & theory cards ─── */
.phys-intro {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.phys-group { margin-bottom: 12px; }
.phys-group-title {
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cyan);
  margin-bottom: 6px;
  opacity: 0.85;
}
.phys-card {
  background: rgba(0, 18, 44, 0.45);
  border: 1px solid var(--glass-border);
  border-left: 2px solid rgba(57, 230, 200, 0.5);
  border-radius: 6px;
  padding: 8px 11px;
  margin-bottom: 6px;
}
.phys-card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}
.phys-label {
  font-size: 11px;
  color: var(--text-secondary, #cdd8ec);
  font-weight: 600;
}
.phys-value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-data);
  white-space: nowrap;
}
.phys-unit {
  font-size: 9.5px;
  font-weight: 500;
  color: var(--text-muted);
}
.phys-formula {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--amber);
  margin-top: 5px;
  padding: 3px 7px;
  background: rgba(240, 184, 64, 0.08);
  border-radius: 4px;
  letter-spacing: 0.02em;
  overflow-x: auto;
  white-space: nowrap;
}
.phys-note {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: 5px;
  letter-spacing: 0.02em;
}

/* ─── Moon detail modal ─── */
.moon-modal {
  width: 100%;
  max-width: 640px;
  background: linear-gradient(180deg, rgba(8,16,32,0.98), rgba(4,10,22,0.99));
  border: 1px solid var(--glass-border-bright);
  border-radius: 14px;
  padding: 24px 26px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; gap: 18px;
  animation: libSlideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.moon-modal-head {
  display: flex; align-items: center; gap: 16px;
}
.moon-modal-dot {
  width: 56px; height: 56px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(0, 150, 220, 0.2), inset 0 0 8px rgba(0,0,0,0.4);
}
.moon-modal-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cyan-dim);
  margin-bottom: 4px;
}
.moon-modal-title {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}
.moon-modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.moon-modal-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ─── Photo mode (hide UI chrome) ─── */
body.photo-mode #toolbar,
body.photo-mode #left-panel,
body.photo-mode #right-panel,
body.photo-mode #bottom-bar,
body.photo-mode .scale-disclaimer,
body.photo-mode .kbd-help-toggle,
body.photo-mode .kbd-help,
body.photo-mode #tour-panel,
body.photo-mode .label-layer {
  display: none !important;
}
.photo-mode-overlay {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 50;
  display: flex; gap: 10px;
  align-items: center;
  background: rgba(0, 12, 28, 0.7);
  border: 1px solid var(--glass-border-bright);
  border-radius: 22px;
  padding: 8px 16px;
  backdrop-filter: blur(10px);
}
.photo-mode-overlay-text {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cyan);
}
.photo-mode-exit {
  background: var(--cyan);
  color: #030814;
  border: none;
  border-radius: 14px;
  padding: 5px 12px;
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
}

/* ─── Distance measurement HUD ─── */
.measure-hud {
  position: absolute;
  top: 60px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 10px 18px;
  z-index: 6;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap; justify-content: center;
  max-width: calc(100% - 24px);
  backdrop-filter: blur(10px);
}
.measure-hud-label {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--amber);
}
.measure-hud-bodies {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-secondary);
}
.measure-hud-value {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  color: var(--cyan);
}
.measure-hud-light {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ─── Event banner ─── */
.event-banner {
  position: absolute;
  top: 60px; right: 20px;
  background: rgba(0, 38, 80, 0.92);
  border: 1px solid var(--amber);
  border-left: 3px solid var(--amber);
  border-radius: 8px;
  padding: 10px 14px;
  max-width: 320px;
  z-index: 6;
  backdrop-filter: blur(10px);
  animation: libSlideUp 0.4s ease;
}
.event-banner-eyebrow {
  font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}
.event-banner-title {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.event-banner-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ─── Tour narration card ─── */
.tour-narration {
  position: absolute;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel-solid);
  border: 1px solid var(--cyan);
  border-radius: 12px;
  padding: 16px 22px;
  /* Never wider than the gap between the side panels, so it can't slide
     under the right panel on narrower windows. */
  width: max-content;
  max-width: min(540px, calc(100% - 32px));
  z-index: 6;
  backdrop-filter: blur(12px);
  box-shadow: 0 12px 32px rgba(0, 207, 234, 0.15);
}
.tour-narration-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cyan-dim);
  margin-bottom: 6px;
}
.tour-narration-text {
  font-size: 13.5px;
  color: var(--text-primary);
  line-height: 1.6;
  text-wrap: pretty;
}

/* ─── Tours popover ─── */
.tours-popover {
  position: absolute;
  top: 38px; right: 0;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 8px;
  min-width: 280px;
  z-index: 20;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  display: flex; flex-direction: column;
  gap: 3px;
}
.tours-popover-item {
  background: transparent;
  border: none;
  border-radius: 6px;
  padding: 10px 12px;
  text-align: left;
  cursor: pointer;
  transition: background 0.14s;
}
.tours-popover-item:hover {
  background: rgba(0, 100, 160, 0.25);
}
.tours-popover-name {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.05em;
  margin-bottom: 3px;
}
.tours-popover-desc {
  font-size: 10.5px;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* ─── Compare modal ─── */
.compare-modal {
  width: 100%;
  max-width: 760px;
  background: linear-gradient(180deg, rgba(8,16,32,0.98), rgba(4,10,22,0.99));
  border: 1px solid var(--glass-border-bright);
  border-radius: 14px;
  padding: 28px 28px 24px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; gap: 22px;
  animation: libSlideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
}
.compare-modal-head {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}
.compare-half {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.compare-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0, 150, 220, 0.25), inset 0 0 10px rgba(0,0,0,0.4);
}
.compare-name {
  font-family: var(--font-mono);
  font-size: 18px; font-weight: 700;
  color: var(--text-primary);
}
.compare-vs {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.12em;
}
.compare-table {
  display: flex; flex-direction: column;
  gap: 2px;
  background: rgba(0, 18, 44, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 6px;
}
.compare-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  padding: 9px 14px;
  border-radius: 5px;
}
.compare-row:nth-child(odd) {
  background: rgba(0, 30, 60, 0.4);
}
.compare-cell-a {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-data);
  text-align: right;
  font-weight: 700;
}
.compare-cell-label {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  min-width: 110px;
}
.compare-cell-b {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-data);
  text-align: left;
  font-weight: 700;
}

/* ============================================================
   CINEMATIC / SHAREABILITY / ONBOARDING ADDITIONS
============================================================ */

/* Calmer default view: the disclaimer settles away after a moment and
   returns briefly whenever the scale mode changes. */
.scale-disclaimer {
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.scale-disclaimer.dimmed {
  opacity: 0;
  transform: translateX(-50%) translateY(-6px);
}

/* ── Lightweight toast (main app root) ── */
.app-toast {
  position: fixed;
  bottom: 84px; left: 50%;
  transform: translateX(-50%);
  background: rgba(4, 10, 24, 0.95);
  border: 1px solid var(--glass-border-bright);
  border-radius: 22px;
  padding: 10px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--cyan);
  letter-spacing: 0.04em;
  z-index: 400;
  pointer-events: none;
  animation: libSlideUp 0.3s ease;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}

/* ── Share popover (toolbar) ── */
.share-pop {
  position: absolute;
  top: 38px; right: 0;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border-bright);
  border-radius: 10px;
  padding: 6px;
  min-width: 230px;
  z-index: 20;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  display: flex; flex-direction: column; gap: 3px;
}
.share-pop-item {
  display: flex; align-items: center; gap: 11px;
  background: transparent; border: none;
  border-radius: 6px;
  padding: 10px 12px;
  text-align: left;
  cursor: pointer;
  transition: background 0.13s;
  color: var(--text-secondary);
}
.share-pop-item:hover { background: rgba(0, 100, 160, 0.25); color: var(--cyan); }
.share-pop-ico {
  font-size: 15px; width: 18px; text-align: center;
  color: var(--cyan);
}
.share-pop-txt { display: flex; flex-direction: column; gap: 2px; }
.share-pop-name {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em;
}
.share-pop-sub {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

/* ── First-run onboarding ── */
.intro-backdrop {
  position: fixed; inset: 0;
  z-index: 900;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(3,8,20,0.72), rgba(2,5,14,0.92));
  backdrop-filter: blur(10px);
  padding: 24px;
}
.intro-card {
  position: relative;
  width: min(440px, 100%);
  background: linear-gradient(180deg, rgba(8,16,34,0.96), rgba(4,9,20,0.98));
  border: 1px solid var(--glass-border-bright);
  border-radius: 18px;
  padding: 34px 34px 28px;
  box-shadow: 0 30px 90px rgba(0,0,0,0.7), inset 0 1px 0 rgba(120,200,255,0.08);
  animation: introRise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  text-align: center;
}
@keyframes introRise {
  from { transform: translateY(22px) scale(0.98); }
  to   { transform: translateY(0) scale(1); }
}
.intro-mark {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 30%, #FFE566, #FF8C00 58%, #993300);
  box-shadow: 0 0 38px rgba(255, 150, 30, 0.55);
  position: relative;
}
.intro-mark::after {
  content: '';
  position: absolute; inset: -7px;
  border-radius: 50%;
  border: 1px solid rgba(0, 207, 234, 0.4);
}
.intro-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 10px;
}
.intro-title {
  font-family: var(--font-mono);
  font-size: 25px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1.1;
  margin-bottom: 12px;
}
.intro-text {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.65;
  text-wrap: pretty;
  margin-bottom: 24px;
}
.intro-actions {
  display: flex; flex-direction: column; gap: 9px;
}
.intro-btn {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 13px 18px;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.16s;
  border: 1px solid var(--glass-border);
  background: rgba(0, 18, 44, 0.6);
  color: var(--text-secondary);
}
.intro-btn:hover { border-color: var(--glass-border-bright); color: var(--cyan); }
.intro-btn.primary {
  background: var(--cyan);
  border-color: var(--cyan);
  color: #030814;
  box-shadow: 0 0 18px rgba(0, 207, 234, 0.3);
}
.intro-btn.primary:hover { color: #030814; filter: brightness(1.07); }
.intro-skip {
  margin-top: 14px;
  background: transparent; border: none;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
}
.intro-skip:hover { color: var(--text-secondary); }

/* ── Icon alignment helpers (monoline SVG set) ── */
.qa-btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
.intro-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
.photo-mode-exit { display: inline-flex; align-items: center; gap: 6px; }
.photo-mode-overlay-text { display: inline-flex; align-items: center; gap: 8px; }
.bb-pill { display: inline-flex; align-items: center; gap: 5px; }
.measure-hud-label { display: inline-flex; align-items: center; gap: 6px; }
.share-pop-ico svg { margin: 0 auto; }
.tool-btn svg { opacity: 0.92; }
.tool-btn.primary svg, .tool-btn:hover svg { opacity: 1; }

/* ════════════════════════════════════════════════════════════════
   PREMIUM LAYER  ·  instrument-grade reskin
   Pure additive override — wins by cascade order, no feature changes.
   Themes switch via  html[data-ds="observatory|atelier|aurora"]
   Glow scales with   --glow  (0 matte … 1 neon),  accent via --cyan family
════════════════════════════════════════════════════════════════ */
:root{
  /* motion */
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  /* glow multiplier (set by Tweaks; 0.5 = balanced) */
  --glow: 0.5;
  /* tighter instrument radii */
  --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 11px;
  /* two-tone hairlines for the "anodized + glass" edge */
  --edge-out: rgba(0, 0, 0, 0.55);
  --edge-in:  rgba(180, 214, 240, 0.07);
  /* fine sensor grain */
  --grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/></svg>");
  --font-display: 'Space Grotesk', 'Outfit', system-ui, sans-serif;

  /* ── DEFAULT · OBSERVATORY (refined NASA/JPL) ── */
  --bg-void: #05070E;
  --bg-deep: #080C16;
  --bg-panel: rgba(10, 15, 26, 0.74);
  --bg-panel-solid: rgba(9, 13, 23, 0.97);
  --glass-border: rgba(122, 168, 198, 0.13);
  --glass-border-bright: rgba(90, 210, 230, 0.40);
  --cyan: #38B6C9;
  --cyan-dim: rgba(56, 182, 201, 0.52);
  --cyan-deep: #1E7F90;
  --accent-bright: #62D9EA;
  --amber: #E6B25C;
  --amber-dim: rgba(230, 178, 92, 0.6);
  --text-primary: rgba(228, 237, 248, 0.96);
  --text-secondary: rgba(176, 198, 222, 0.80);
  --text-muted: rgba(120, 148, 180, 0.62);
  --text-data: #C2E7EF;
  --on-accent: #04121A;
}

/* ── ATELIER · luxury instrument (warm graphite + champagne brass) ── */
html[data-ds="atelier"]{
  --bg-void: #0A0908;
  --bg-deep: #110E0B;
  --bg-panel: rgba(24, 20, 15, 0.76);
  --bg-panel-solid: rgba(20, 17, 12, 0.975);
  --glass-border: rgba(201, 168, 120, 0.16);
  --glass-border-bright: rgba(212, 178, 116, 0.46);
  --cyan: #C6A267;
  --cyan-dim: rgba(198, 162, 103, 0.55);
  --cyan-deep: #8A6E3E;
  --accent-bright: #E6CB94;
  --amber: #D9925A;
  --amber-dim: rgba(217, 146, 90, 0.6);
  --text-primary: rgba(241, 234, 223, 0.96);
  --text-secondary: rgba(206, 192, 170, 0.80);
  --text-muted: rgba(160, 142, 114, 0.62);
  --text-data: #ECD9B4;
  --on-accent: #1A130A;
}

/* ── AURORA · clean glass (airy, translucent, silver-cyan) ── */
html[data-ds="aurora"]{
  --bg-void: #0A0F18;
  --bg-deep: #0E1521;
  --bg-panel: rgba(24, 33, 48, 0.56);
  --bg-panel-solid: rgba(16, 23, 35, 0.95);
  --glass-border: rgba(190, 214, 236, 0.18);
  --glass-border-bright: rgba(150, 222, 238, 0.50);
  --cyan: #7FC9DA;
  --cyan-dim: rgba(127, 201, 218, 0.55);
  --cyan-deep: #4E97AC;
  --accent-bright: #ADE4EF;
  --amber: #F0C277;
  --amber-dim: rgba(240, 194, 119, 0.6);
  --text-primary: rgba(238, 244, 251, 0.97);
  --text-secondary: rgba(196, 214, 234, 0.84);
  --text-muted: rgba(146, 172, 200, 0.66);
  --text-data: #D6EEF5;
  --on-accent: #061018;
}
html[data-ds="aurora"] #left-panel,
html[data-ds="aurora"] #right-panel,
html[data-ds="aurora"] #toolbar,
html[data-ds="aurora"] #bottom-bar { backdrop-filter: blur(26px) saturate(1.15); }

/* ── Typography: display grotesk for chrome, mono kept for data ── */
body { font-family: var(--font-display); letter-spacing: 0.01em; }
.brand-name, .lib-title, .body-name-lg, .moon-modal-title, .compare-name,
.no-sel-title, .splash-title {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.005em;
}
.brand-name { font-weight: 700; letter-spacing: 0.14em; }
.panel-h, .data-cell-label, .bb-label, .lib-eyebrow, .mode-tab, .tool-btn,
.speed-preset-btn, .lib-tab, .body-pill, .kbd-help-section {
  font-family: var(--font-display);
}
/* numerals everywhere align like an instrument readout */
.data-cell-value, .phys-value, .orbel-val, .measure-hud-value, .bb-pill,
.speed-readout, .lib-body-stat-val, .compare-cell-a, .compare-cell-b,
.moon-diam, .planet-au, .lib-timeline-year, .lib-mission-years {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1, "zero" 1;
}

/* ── Panels: anodized + glass — twin hairline, grain, tighter radius ── */
#toolbar, #bottom-bar, #left-panel, #right-panel {
  background-color: var(--bg-panel);
  background-image: var(--grain);
  backdrop-filter: blur(20px) saturate(1.08);
}
#left-panel  { box-shadow: inset -1px 0 0 var(--edge-in), 1px 0 0 var(--edge-out), 18px 0 40px -28px rgba(0,0,0,0.7); }
#right-panel { box-shadow: inset 1px 0 0 var(--edge-in), -1px 0 0 var(--edge-out), -18px 0 40px -28px rgba(0,0,0,0.7); }
#toolbar     { box-shadow: inset 0 1px 0 var(--edge-in), 0 1px 0 var(--edge-out); }
#bottom-bar  { box-shadow: inset 0 -1px 0 var(--edge-in), 0 -1px 0 var(--edge-out); }

/* ── Toolbar architecture: primary / standard / ghost hierarchy ── */
.tool-btn {
  border-radius: var(--r-sm);
  transition: color .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease);
}
.tool-btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.tool-btn.ghost:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--glass-border);
  color: var(--text-secondary);
}
.tool-btn.primary {
  background: linear-gradient(180deg, color-mix(in srgb, var(--cyan) 22%, transparent), color-mix(in srgb, var(--cyan) 9%, transparent));
  border-color: var(--glass-border-bright);
  color: var(--accent-bright);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 0 calc(16px * var(--glow)) color-mix(in srgb, var(--cyan) 45%, transparent);
}
.tool-btn.primary:hover {
  background: linear-gradient(180deg, color-mix(in srgb, var(--cyan) 30%, transparent), color-mix(in srgb, var(--cyan) 14%, transparent));
}
.brand-logo { box-shadow: 0 0 calc(16px * var(--glow)) rgba(255, 150, 30, 0.55), inset 0 0 6px rgba(255,220,140,0.5); }

/* ── Mode tabs: calmer, glow only on the active instrument ── */
.mode-tabs { border-radius: var(--r-sm); }
.mode-tab { border-radius: var(--r-xs); transition: all .18s var(--ease); }
.mode-tab.active {
  background: var(--cyan);
  color: var(--on-accent);
  box-shadow: 0 0 calc(14px * var(--glow)) color-mix(in srgb, var(--cyan) 50%, transparent), inset 0 1px 0 rgba(255,255,255,0.2);
}

/* ── Inputs / cells: instrument edges ── */
.search-input, .scale-info, .toggle-row, .data-cell, .moon-card, .edu-block,
.phys-card, .orbel-row, .speed-presets, .mode-tabs, .lib-search-input {
  border-radius: var(--r-sm);
}
.search-input:focus, .lib-search-input:focus {
  box-shadow: inset 0 0 0 1px var(--glass-border-bright), 0 0 calc(10px * var(--glow)) color-mix(in srgb, var(--cyan) 30%, transparent);
}

/* ── Dashboard-grade data grid (right panel) ── */
.data-grid { gap: 1px; background: var(--glass-border); border: 1px solid var(--glass-border); border-radius: var(--r-md); overflow: hidden; }
.data-cell {
  border: none; border-radius: 0;
  background: var(--bg-panel-solid);
  position: relative;
  padding: 10px 11px;
}
.data-cell::before {
  content: ''; position: absolute; left: 0; top: 9px; bottom: 9px; width: 2px;
  background: var(--cyan-dim); opacity: 0.55; border-radius: 0 2px 2px 0;
}
.data-cell-label { color: var(--text-muted); }
.data-cell-value { color: var(--text-data); letter-spacing: 0.01em; }
.data-cell-sub   { color: var(--cyan-dim); }

/* ── Selection / hover micro-interactions ── */
.planet-row, .toggle-row, .qa-btn, .moon-card, .lib-body-card, .lib-concept-card,
.tours-popover-item, .lib-ref-link, .speed-preset-btn, .date-popover-preset, .lib-tab {
  transition: all .18s var(--ease);
}
.planet-row:hover { transform: translateX(2px); }
.qa-btn:hover, .lib-ext-link:hover { transform: translateY(-1px); }
.play-btn {
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 0 calc(14px * var(--glow)) color-mix(in srgb, var(--cyan) 45%, transparent);
  transition: transform .2s var(--ease), box-shadow .2s var(--ease);
}
.play-btn.paused { box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 0 calc(14px * var(--glow)) color-mix(in srgb, var(--amber) 45%, transparent); }

/* ── Right-panel reveal: staggered, instrument power-up ── */
@keyframes premReveal { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
#right-panel > * { animation: premReveal .42s var(--ease) both; }
#right-panel > *:nth-child(2) { animation-delay: .04s; }
#right-panel > *:nth-child(3) { animation-delay: .08s; }
#right-panel > *:nth-child(4) { animation-delay: .12s; }
#right-panel > *:nth-child(5) { animation-delay: .16s; }
#right-panel > *:nth-child(n+6) { animation-delay: .2s; }

/* ── Modals: deeper, softer premium shadow ── */
.lib-modal, .moon-modal, .compare-modal {
  box-shadow: 0 40px 110px rgba(0,0,0,0.72), inset 0 1px 0 rgba(180,214,240,0.10);
}
.lib-tab.active::after { box-shadow: 0 0 calc(12px * var(--glow)) color-mix(in srgb, var(--cyan) 55%, transparent); }

/* ── Bottom-bar pills + edge toggle refinement ── */
.bb-pill { border-radius: var(--r-sm); }
.right-toggle { transition: right 0.34s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease); }
.right-toggle:hover { box-shadow: -8px 0 24px -12px color-mix(in srgb, var(--cyan) 60%, transparent); }

/* Respect reduced-motion + Tweaks motion toggle */
@media (prefers-reduced-motion: reduce) {
  #right-panel > * { animation: none; }
  .planet-row:hover, .qa-btn:hover, .lib-ext-link:hover { transform: none; }
}
html[data-motion="off"] #right-panel > * { animation: none !important; }
html[data-motion="off"] .planet-row:hover,
html[data-motion="off"] .qa-btn:hover,
html[data-motion="off"] .lib-ext-link:hover { transform: none; }

/* ════════════════════════════════════════════════════════════════
   SCIENTIFIC REFINEMENT  ·  flatten · de-glow · instrument-grade
   The chrome should read like a serious observatory console, not a
   gamer HUD: matte opaque panels, hairline rules, zero gradient
   buttons, a precise mark — restraint over decoration.
════════════════════════════════════════════════════════════════ */
:root{
  --glow: 0.16;                 /* matte by default; Tweaks can raise */
  --r-xs: 3px; --r-sm: 4px; --r-md: 6px; --r-lg: 9px;
  --rule: rgba(150, 168, 185, 0.12);   /* hairline divider */
}

/* Default (Observatory): cooler, neutral, single restrained accent */
:root, html[data-ds="observatory"]{
  --bg-void: #06080C;
  --bg-deep: #0A0D13;
  --bg-panel: rgba(13, 16, 22, 0.94);          /* opaque matte, not glass */
  --bg-panel-solid: rgba(11, 14, 20, 0.99);
  --glass-border: rgba(150, 168, 185, 0.13);
  --glass-border-bright: rgba(118, 188, 204, 0.34);
  --cyan: #56AEBE;
  --cyan-dim: rgba(86, 174, 190, 0.50);
  --cyan-deep: #2E7B89;
  --accent-bright: #8AD2DE;
  --amber: #D6A24C;
  --amber-dim: rgba(214, 162, 76, 0.55);
  --text-primary: rgba(231, 238, 245, 0.95);
  --text-secondary: rgba(166, 182, 198, 0.78);
  --text-muted: rgba(110, 128, 146, 0.60);
  --text-data: #CFE4EB;
  --on-accent: #05121A;
}

/* Matte panels — drop the heavy glass blur, lean on opacity + hairline */
#toolbar, #bottom-bar, #left-panel, #right-panel {
  backdrop-filter: blur(7px) saturate(1.02);
}
html[data-ds="aurora"] #left-panel,
html[data-ds="aurora"] #right-panel,
html[data-ds="aurora"] #toolbar,
html[data-ds="aurora"] #bottom-bar { backdrop-filter: blur(14px) saturate(1.1); }

/* Toolbar: flat instrument tabs — no glow, crisp inversion when active */
.mode-tab { letter-spacing: 0.10em; }
.mode-tab.active {
  background: var(--cyan);
  color: var(--on-accent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--cyan) 70%, white);
}
.mode-tab.active:hover { background: var(--accent-bright); }

/* Buttons: hairline outline, faint fill on primary — never a gradient slab */
.tool-btn { letter-spacing: 0.09em; }
.tool-btn.primary {
  background: color-mix(in srgb, var(--cyan) 11%, transparent);
  border-color: var(--cyan-dim);
  color: var(--accent-bright);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--cyan) 16%, transparent);
}
.tool-btn.primary:hover {
  background: color-mix(in srgb, var(--cyan) 18%, transparent);
  border-color: var(--glass-border-bright);
}

/* The mark: a precise reticle ring + amber core, not a glowing candy ball */
.brand-logo {
  background: radial-gradient(circle, var(--amber) 0 1.8px, transparent 2.4px);
  border: 1.4px solid var(--glass-border-bright);
  box-shadow: none;
}
.brand-logo::after {
  inset: 3px;
  border: 1px solid var(--rule);
}
.brand-name { letter-spacing: 0.20em; font-weight: 600; color: var(--text-primary); }
.brand-tag  { letter-spacing: 0.26em; color: var(--text-muted); }

/* Panel section headers: small-caps rule with a tick, like a log header */
.panel-h {
  letter-spacing: 0.20em;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--rule);
}
.panel-h::before {
  content: ''; width: 5px; height: 5px; flex-shrink: 0;
  background: var(--cyan); opacity: 0.7;
}

/* Data grid: tighter, ruled, units quiet — reads like a readout table */
.data-grid { gap: 1px; background: var(--rule); border-color: var(--rule); border-radius: var(--r-md); }
.data-cell::before { background: var(--cyan); opacity: 0.35; width: 2px; }
.data-cell-label { letter-spacing: 0.16em; }

/* Quiet the decorative pills — flat, hairline, no glow */
.bb-pill.follow { box-shadow: none; }
.panel-h-tag, .body-pill, .dwarf-tag { letter-spacing: 0.14em; }

/* Inputs: crisp, matte */
.search-input, .lib-search-input { background: rgba(0,0,0,0.28); }
.search-input:focus, .lib-search-input:focus {
  box-shadow: inset 0 0 0 1px var(--glass-border-bright);
}

/* Tighten radii on the smaller chrome for a rectilinear, instrument feel */
.mode-tabs, .speed-presets, .tool-btn, .mode-tab, .bb-pill, .qa-btn { border-radius: var(--r-sm); }
.brand-logo, .planet-dot, .moon-dot, .search-result-dot { border-radius: 50%; }

/* ── Muted units + mini scale bars in data cells ── */
.data-cell-value .u {
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.78em;
  letter-spacing: 0.04em;
  margin-left: 3px;
}
.data-bar {
  height: 3px; margin-top: 7px;
  background: var(--rule);
  border-radius: 2px; overflow: hidden;
}
.data-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width .5s var(--ease);
}

/* ── Telemetry readout — live viewing-geometry HUD ── */
.telemetry {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 5;
  min-width: 188px;
  padding: 9px 11px 10px;
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 var(--edge-in), 0 12px 30px -18px rgba(0,0,0,0.8);
  backdrop-filter: blur(7px);
  font-family: var(--font-mono);
  pointer-events: none;
  user-select: none;
}
.tlm-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.20em;
  color: var(--text-muted);
  padding-bottom: 7px; margin-bottom: 7px;
  border-bottom: 1px solid var(--rule);
}
.tlm-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 calc(7px * var(--glow)) var(--cyan);
}
.tlm-target {
  margin-left: auto;
  color: var(--cyan-dim);
  letter-spacing: 0.08em;
  text-transform: none;
  max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tlm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 14px;
}
.tlm-clock {
  margin-top: 7px; padding-top: 7px;
  border-top: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 2px;
}
.tlm-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.tlm-k {
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}
.tlm-v {
  font-size: 10.5px; font-weight: 700;
  color: var(--text-data);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1, "zero" 1;
}
body.photo-mode .telemetry { display: none !important; }
@media (max-width: 900px) { .telemetry { display: none; } }
.tlm-radec {
  margin-top: 7px; padding-top: 7px;
  border-top: 1px solid var(--brand-gold-soft, var(--rule));
  display: flex; flex-direction: column; gap: 2px;
}
.tlm-radec-h {
  font-size: 7.5px; font-weight: 700; letter-spacing: 0.18em;
  color: var(--brand-gold, var(--cyan-dim));
  margin-bottom: 3px;
}
.tlm-radec .tlm-v { font-size: 10px; letter-spacing: 0.02em; }

/* ── Metallic gold treatment on brand marks + modal eyebrows ── */
.brand-name .bn-2 {
  background: linear-gradient(135deg, #F2DCA0 0%, var(--brand-gold) 42%, #A77F3C 78%, #EAD49A 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  border-color: var(--brand-gold-soft);
}
.lib-eyebrow, .moon-modal-eyebrow {
  background: linear-gradient(120deg, #EAD49A, var(--brand-gold) 55%, #B58B45);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Catalog motif on modal headers — N° index · domain ── */
.lib-header, .moon-modal-head, .compare-head { position: relative; }
.modal-cat {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 700; letter-spacing: 0.22em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.modal-cat .mc-no { color: var(--brand-gold); }
.modal-cat .mc-line { flex: 1; height: 1px; background: var(--rule); max-width: 90px; }

/* ── Command palette (⌘K) ── */
.cmdk-backdrop {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 14vh;
  background: radial-gradient(ellipse at center, rgba(3,5,11,0.7), rgba(2,3,8,0.9));
  backdrop-filter: blur(10px) saturate(0.9);
  animation: cmdkFade .16s var(--ease) both;
}
@keyframes cmdkFade { from { opacity: 0; } to { opacity: 1; } }
.cmdk {
  width: min(560px, 92vw);
  background: var(--bg-panel-solid);
  border: 1px solid var(--glass-border);
  border-top: 1px solid var(--bezel);
  border-radius: var(--r-lg);
  box-shadow: 0 40px 110px rgba(0,0,0,0.74), inset 0 1px 0 var(--edge-in);
  overflow: hidden;
  animation: cmdkRise .2s var(--ease) both;
}
@keyframes cmdkRise { from { opacity: 0; transform: translateY(-8px) scale(0.99); } to { opacity: 1; transform: none; } }
.cmdk-input-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--rule);
  color: var(--text-muted);
}
.cmdk-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--font-display);
  font-size: 15px; letter-spacing: 0.01em;
  color: var(--text-primary);
}
.cmdk-input::placeholder { color: var(--text-muted); }
.cmdk-esc {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--text-muted);
  padding: 3px 6px; border: 1px solid var(--rule); border-radius: 4px;
}
.cmdk-list { max-height: 46vh; overflow-y: auto; padding: 6px; }
.cmdk-empty { padding: 22px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
.cmdk-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: var(--r-sm);
  cursor: pointer; transition: background .12s var(--ease);
}
.cmdk-item.active { background: color-mix(in srgb, var(--cyan) 14%, transparent); }
.cmdk-group {
  font-family: var(--font-mono); font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  width: 78px; flex-shrink: 0;
}
.cmdk-label { flex: 1; font-size: 13.5px; color: var(--text-primary); letter-spacing: 0.01em; }
.cmdk-item.active .cmdk-label { color: var(--accent-bright); }
.cmdk-hint {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em;
  color: var(--text-muted);
}
.cmdk-foot {
  display: flex; align-items: center; gap: 16px;
  padding: 9px 16px;
  border-top: 1px solid var(--rule);
  font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.08em;
  color: var(--text-muted);
}
.cmdk-key {
  display: inline-block; padding: 1px 4px; margin-right: 3px;
  border: 1px solid var(--rule); border-radius: 3px;
  color: var(--text-secondary);
}

/* ── Orbital minimap inset ── */
.minimap {
  position: absolute; bottom: 16px; right: 16px; z-index: 5;
  padding: 9px 9px 7px;
  background: var(--bg-panel-solid);
