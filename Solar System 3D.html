// Distance formatter honouring the Tweaks unit (AU / M km / Gm).
function fmtDistAU(au) {
  const u = window.__distUnit || 'AU';
  if (u === 'M km') return { val: (au * 149.597871).toFixed(2), unit: 'M km' };
  if (u === 'light') return { val: (au * 8.317).toFixed(2), unit: 'lt-min' };
  return { val: au.toFixed(3), unit: 'AU' };
}
const CMDK_RECENTS_KEY = 'solar_cmdk_recents';
const CMDK_VIEWS_KEY = 'solar_saved_views';
function cmdkGetRecents() { try { return JSON.parse(localStorage.getItem(CMDK_RECENTS_KEY) || '[]'); } catch (e) { return []; } }
function cmdkPushRecent(id) {
  if (!id) return;
  let r = cmdkGetRecents().filter(x => x !== id);
  r.unshift(id); r = r.slice(0, 5);
  try { localStorage.setItem(CMDK_RECENTS_KEY, JSON.stringify(r)); } catch (e) {}
}
function cmdkGetViews() { try { return JSON.parse(localStorage.getItem(CMDK_VIEWS_KEY) || '[]'); } catch (e) { return []; } }
function cmdkSaveViews(v) { try { localStorage.setItem(CMDK_VIEWS_KEY, JSON.stringify(v)); } catch (e) {} }
function bodyById(id) {
  return (window.SOL_DATA || []).find(x => x.id === id)
    || (window.DWARF_PLANETS || []).find(x => x.id === id)
    || (window.COMETS || []).find(x => x.id === id)
    || (window.SPACECRAFT || []).find(x => x.id === id);
}
function exportBodyData(id) {
  const b = bodyById(id);
  if (!b) return;
  const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'solar3d-' + id + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

// ─── COMMAND PALETTE (⌘K) — elite keyboard command surface ─────────────
function CommandPalette({ open, onClose, onSelectBody, dispatch, state, sim, onToast }) {
  const [q, setQ] = React.useState('');
  const [idx, setIdx] = React.useState(0);
  const [bump, setBump] = React.useState(0);   // re-read views/recents
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) { setQ(''); setIdx(0); setBump(b => b + 1); setTimeout(() => inputRef.current && inputRef.current.focus(), 30); }
  }, [open]);

  const setTheme = (name) => {
    document.documentElement.dataset.ds = name.toLowerCase();
    try {
      const k = 'tweaks:premium-tweaks';
      const cur = JSON.parse(localStorage.getItem(k) || '{}');
      cur.theme = name; localStorage.setItem(k, JSON.stringify(cur));
    } catch (e) {}
  };
  const shiftDate = (ms) => {
    if (!sim || !sim.getSimDate) return;
    try { sim.setSimDate(new Date(sim.getSimDate().getTime() + ms)); } catch (e) {}
  };

  const commands = React.useMemo(() => {
    const navOf = (b, group) => ({
      group, label: b.name, hint: 'Fly to', kind: 'nav', id: b.id,
      run: () => { cmdkPushRecent(b.id); onSelectBody(b.id); },
    });
    const recentIds = cmdkGetRecents();
    const recents = recentIds.map(id => bodyById(id)).filter(Boolean).map(b => navOf(b, 'Recent'));

    const planets = (window.SOL_DATA || []).map(b => navOf(b, 'Navigate'));
    const dwarfs = (window.DWARF_PLANETS || []).map(b => navOf(b, 'Dwarf planet'));
    const comets = (window.COMETS || []).map(b => navOf(b, 'Comet'));

    const modes = [
      ['hybrid', 'Hybrid scale'], ['real_distance', 'Real distance'],
      ['real_size', 'Real size'], ['true_scale', 'True 1:1 scale'],
    ].map(([m, label]) => ({
      group: 'View mode', label, hint: state.mode === m ? 'active' : 'switch',
      run: () => dispatch({ mode: m }),
    }));
    const layers = [
      ['showOrbits', 'Orbit paths'], ['showLabels', 'Body labels'],
      ['showEcliptic', 'Ecliptic grid'], ['showConstellations', 'Constellations'],
      ['showAsteroids', 'Asteroid belt'], ['showComets', 'Comets'],
      ['showDwarfPlanets', 'Dwarf planets'], ['showHabitableZone', 'Habitable zone'],
      ['showMagnetospheres', 'Magnetospheres'], ['showSpacecraft', 'Spacecraft'],
    ].map(([key, label]) => ({
      group: 'Toggle layer', label, hint: state[key] ? 'on → off' : 'off → on',
      run: () => dispatch({ [key]: !state[key] }),
    }));
    const themes = ['Observatory', 'Atelier', 'Aurora'].map(t => ({
      group: 'Theme', label: t, hint: 'apply', run: () => setTheme(t),
    }));
    const times = [
      { label: 'Jump to now', ms: null, hint: 'today' },
      { label: 'Advance 1 month', ms: 30 * 86400000, hint: '+30d' },
      { label: 'Advance 1 year', ms: 365.25 * 86400000, hint: '+1yr' },
      { label: 'Rewind 1 year', ms: -365.25 * 86400000, hint: '−1yr' },
      { label: 'Advance 10 years', ms: 10 * 365.25 * 86400000, hint: '+10yr' },
    ].map(t => ({
      group: 'Time', label: t.label, hint: t.hint,
      run: () => { if (t.ms == null) { if (sim) try { sim.setSimDate(new Date()); } catch (e) {} } else shiftDate(t.ms); },
    }));
    const views = cmdkGetViews().map((v, i) => ({
      group: 'Saved view', label: v.name, hint: 'open',
      run: () => {
        if (v.mode) dispatch({ mode: v.mode });
        if (v.date && sim) try { sim.setSimDate(new Date(v.date)); } catch (e) {}
        if (v.selectedId) onSelectBody(v.selectedId); else dispatch({ selectedId: null });
      },
    }));
    const actions = [
      { group: 'Action', label: state.paused ? 'Resume motion' : 'Pause motion', hint: 'space', run: () => dispatch({ paused: !state.paused }) },
      { group: 'Action', label: 'Reset view', hint: '', run: () => { if (sim && sim.resetView) sim.resetView(); dispatch({ selectedId: null }); } },
      { group: 'Action', label: 'Top-down view', hint: '', run: () => { if (sim && sim.topDownView) sim.topDownView(); } },
      { group: 'Action', label: 'Save current view', hint: 'bookmark', run: () => {
        const bn = state.selectedId ? (bodyById(state.selectedId) || {}).name : null;
        const dt = sim && sim.getSimDate ? sim.getSimDate() : new Date();
        const name = (bn || 'View') + ' · ' + dt.toISOString().slice(0, 10);
        const v = cmdkGetViews(); v.unshift({ name, mode: state.mode, selectedId: state.selectedId, date: dt.toISOString() });
        cmdkSaveViews(v.slice(0, 12));
        if (onToast) onToast('View saved · ' + name);
      } },
    ];
    if (state.selectedId) {
      actions.push({ group: 'Action', label: 'Export selection data (JSON)', hint: 'download', run: () => { exportBodyData(state.selectedId); if (onToast) onToast('Data exported'); } });
    }
    return [...recents, ...actions, ...times, ...themes, ...modes, ...layers, ...views, ...planets, ...dwarfs, ...comets];
  }, [state, sim, onSelectBody, dispatch, onToast, bump]);

  const filtered = React.useMemo(() => {
    const s = q.trim().toLowerCase();
    if (!s) {
      // Empty query: show recents (if any) + top actions
      const recents = commands.filter(c => c.group === 'Recent');
      const top = commands.filter(c => c.group === 'Action' || c.group === 'Time').slice(0, 6);
      const base = [...recents, ...top];
      return base.slice(0, 10);
    }
    return commands.filter(c => (c.label + ' ' + c.group).toLowerCase().includes(s)).slice(0, 10);
  }, [q, commands]);

  React.useEffect(() => { setIdx(0); }, [q]);

  if (!open) return null;

  const exec = (c) => { if (c) { c.run(); onClose(); } };

  const onKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setIdx(i => Math.min(filtered.length - 1, i + 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setIdx(i => Math.max(0, i - 1)); }
    else if (e.key === 'Enter') { e.preventDefault(); exec(filtered[idx]); }
    else if (e.key === 'Escape') { e.preventDefault(); onClose(); }
  };

  return (
    <div className="cmdk-backdrop" onClick={onClose}>
      <div className="cmdk" onClick={e => e.stopPropagation()}>
        <div className="cmdk-input-row">
          <Icon name="search" size={15} />
          <input
            ref={inputRef} className="cmdk-input" value={q} onKeyDown={onKey}
            onChange={e => setQ(e.target.value)}
            placeholder="Navigate, switch mode, set time, save a view…"
          />
          <span className="cmdk-esc">ESC</span>
        </div>
        <div className="cmdk-list">
          {filtered.length === 0 && <div className="cmdk-empty">No commands match "{q}".</div>}
          {filtered.map((c, i) => (
            <div
              key={c.group + c.label}
              className={`cmdk-item ${i === idx ? 'active' : ''}`}
              onMouseEnter={() => setIdx(i)}
              onClick={() => exec(c)}
            >
              <span className="cmdk-group">{c.group}</span>
              <span className="cmdk-label">{c.label}</span>
              {c.hint && <span className="cmdk-hint">{c.hint}</span>}
            </div>
          ))}
        </div>
        <div className="cmdk-foot">
          <span><span className="cmdk-key">↑↓</span> navigate</span>
          <span><span className="cmdk-key">↵</span> run</span>
          <span><span className="cmdk-key">esc</span> close</span>
          <span style={{ marginLeft: 'auto' }}>type <span className="cmdk-key">1–9</span> on the map to jump</span>
        </div>
      </div>
    </div>
  );
}

// ─── ORBITAL MINIMAP — live top-down locator inset ─────────────────────
function Minimap({ sim, simDate, selectedId, mode, onSelectBody }) {
  const ref = React.useRef(null);
  const hitsRef = React.useRef([]);
  const [hover, setHover] = React.useState(null);

  React.useEffect(() => {
    let raf = 0;
    const OM = window.OrbitalMechanics;
    const planets = ['mercury', 'venus', 'earth', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune'];
    const dwarfs = ['ceres', 'pluto', 'haumea', 'makemake', 'eris'];
    const colors = {
      mercury: '#b8b0a0', venus: '#e8c27a', earth: '#5aa6e0', mars: '#d6663a',
      jupiter: '#d9a066', saturn: '#e6c48a', uranus: '#8fd3d9', neptune: '#5b7be0',
      ceres: '#c9b89a', pluto: '#cbb6a0', haumea: '#dcd6cc', makemake: '#c2a78f', eris: '#d8dde2',
    };
    const nameOf = (id) => {
      const b = (window.SOL_DATA || []).find(x => x.id === id)
        || (window.DWARF_PLANETS || []).find(x => x.id === id)
        || (window.COMETS || []).find(x => x.id === id);
      return b ? b.name : id;
    };
    const draw = () => {
      const cv = ref.current;
      if (!cv || !OM) { raf = requestAnimationFrame(draw); return; }
      const ctx = cv.getContext('2d');
      const W = cv.width, H = cv.height, cx = W / 2, cy = H / 2;
      ctx.clearRect(0, 0, W, H);
      const d = (sim && sim.getSimDate) ? sim.getSimDate() : (simDate || new Date());
      const maxAU = 70;
      const Rpx = Math.min(W, H) / 2 - 8;
      const scale = (au) => Math.pow(Math.min(au, maxAU) / maxAU, 0.4) * Rpx;
      const hits = [];
      // range rings
      ctx.strokeStyle = 'rgba(150,168,185,0.13)'; ctx.lineWidth = 1;
      [1, 5.2, 9.6, 19.2, 30.1].forEach(au => {
        ctx.beginPath(); ctx.arc(cx, cy, scale(au), 0, Math.PI * 2); ctx.stroke();
      });
      // sun
      ctx.fillStyle = '#ffcf6b';
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();

      const plotBody = (id, au, ang, baseR, col) => {
        const r = scale(au);
        const px = cx + Math.cos(ang) * r, py = cy + Math.sin(ang) * r;
        const sel = id === selectedId, hov = hover === id;
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(px, py, sel || hov ? baseR + 1.4 : baseR, 0, Math.PI * 2); ctx.fill();
        if (sel) {
          ctx.strokeStyle = 'rgba(216,179,106,0.95)'; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.arc(px, py, baseR + 4, 0, Math.PI * 2); ctx.stroke();
        }
        hits.push({ id, px, py });
      };

      // planets
      planets.forEach(id => {
        const p = OM.planetHeliocentricAU(id, d);
        if (!p) return;
        plotBody(id, Math.hypot(p.x, p.z), Math.atan2(p.z, p.x), 2, colors[id] || '#9ab');
      });
      // dwarf planets (hollow diamonds)
      if (sim && sim.state && sim.state.showDwarfPlanets !== false) {
        dwarfs.forEach(id => {
          const p = OM.planetHeliocentricAU(id, d);
          if (!p) return;
          const au = Math.hypot(p.x, p.z), ang = Math.atan2(p.z, p.x);
          const r = scale(au), px = cx + Math.cos(ang) * r, py = cy + Math.sin(ang) * r;
          const sel = id === selectedId, hov = hover === id;
          ctx.save(); ctx.translate(px, py); ctx.rotate(Math.PI / 4);
          const s = sel || hov ? 3.4 : 2.4;
          ctx.strokeStyle = colors[id] || '#cbb6a0'; ctx.lineWidth = 1.1;
          ctx.strokeRect(-s, -s, s * 2, s * 2);
          ctx.restore();
          if (sel) { ctx.strokeStyle = 'rgba(216,179,106,0.95)'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2); ctx.stroke(); }
          hits.push({ id, px, py });
        });
      }
      // comets (cross marks, only those near the inner system)
      if (sim && sim.state && sim.state.showComets !== false) {
        (window.COMETS || []).forEach(c => {
          const p = OM.cometHeliocentricAU(c.elements, d);
          if (!p) return;
          const au = Math.hypot(p.x, p.z);
          if (au > maxAU) return;
          const ang = Math.atan2(p.z, p.x), r = scale(au);
          const px = cx + Math.cos(ang) * r, py = cy + Math.sin(ang) * r;
          const sel = c.id === selectedId, hov = hover === c.id;
          const s = sel || hov ? 3.6 : 2.6;
          ctx.strokeStyle = c.color || '#7BD3F0'; ctx.lineWidth = 1.1;
          ctx.beginPath(); ctx.moveTo(px - s, py); ctx.lineTo(px + s, py);
          ctx.moveTo(px, py - s); ctx.lineTo(px, py + s); ctx.stroke();
          hits.push({ id: c.id, px, py });
        });
      }

      // camera heading line
      if (sim && sim.camera) {
        const c = sim.camera.position;
        let a = Math.atan2(c.z, c.x);
        ctx.strokeStyle = 'rgba(120,200,220,0.45)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * Rpx, cy + Math.sin(a) * Rpx); ctx.stroke();
      }
      hitsRef.current = hits;
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [sim, selectedId, hover]);

  const pick = (e) => {
    const cv = ref.current; if (!cv) return null;
    const rect = cv.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (cv.width / rect.width);
    const sy = (e.clientY - rect.top) * (cv.height / rect.height);
    let best = null, bd = 11 * 11;
    hitsRef.current.forEach(h => {
      const dx = h.px - sx, dy = h.py - sy, dd = dx * dx + dy * dy;
      if (dd < bd) { bd = dd; best = h; }
    });
    return best;
  };

  const nameOf = (id) => {
    const b = (window.SOL_DATA || []).find(x => x.id === id)
      || (window.DWARF_PLANETS || []).find(x => x.id === id)
      || (window.COMETS || []).find(x => x.id === id);
    return b ? b.name : id;
  };

  return (
    <div className="minimap">
      <div className="minimap-h"><span className="minimap-dot"></span>ORBITAL PLANE{hover && <span className="minimap-hover">{nameOf(hover)}</span>}</div>
      <canvas
        ref={ref} width="176" height="176" className="minimap-cv"
        onMouseMove={(e) => { const h = pick(e); setHover(h ? h.id : null); e.currentTarget.style.cursor = h ? 'pointer' : 'default'; }}
        onMouseLeave={() => setHover(null)}
        onClick={(e) => { const h = pick(e); if (h && onSelectBody) onSelectBody(h.id); }}
      ></canvas>
    </div>
  );
}

// ─── ON-SCREEN SCALE BAR (adaptive ruler, honest in linear modes) ──────
function ScaleBar({ sim, mode, cameraDist }) {
  const [info, setInfo] = React.useState(null);
  React.useEffect(() => {
    let raf = 0;
    const nice = (x) => {
      const e = Math.floor(Math.log10(x)); const f = x / Math.pow(10, e);
      const nf = f < 1.5 ? 1 : f < 3.5 ? 2 : f < 7.5 ? 5 : 10;
      return nf * Math.pow(10, e);
    };
    const tick = () => {
      if (sim && sim.camera && sim.controls) {
        const cam = sim.camera, tgt = sim.controls.target;
        const dist = cam.position.distanceTo(tgt);
        const vh = (sim.renderer && sim.renderer.domElement.clientHeight) || window.innerHeight;
        const worldPerPx = 2 * Math.tan(cam.fov * Math.PI / 360) * dist / vh;
        const auPerUnit = mode === 'true_scale' ? 1 / 107.46 : mode === 'real_distance' ? 1 / 7 : null;
        if (auPerUnit && worldPerPx > 0 && isFinite(worldPerPx)) {
          const targetAU = 110 * worldPerPx * auPerUnit;
          const niceAU = nice(targetAU);
          const px = niceAU / auPerUnit / worldPerPx;
          let label, sub;
          if (niceAU >= 1) { label = (niceAU >= 1000 ? niceAU.toExponential(0) : niceAU) + ' AU'; sub = (niceAU * 149.598).toExponential(1) + ' M km'; }
          else { const km = niceAU * 149597870.7; label = niceAU.toPrecision(2) + ' AU'; sub = (km >= 1e6 ? (km / 1e6).toFixed(1) + ' M km' : Math.round(km).toLocaleString() + ' km'); }
          setInfo({ px: Math.max(28, Math.min(180, px)), label, sub, linear: true });
        } else {
          setInfo({ linear: false });
        }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [sim, mode]);
  if (!info) return null;
  return (
    <div className="scalebar">
      {info.linear ? (
        <>
          <div className="scalebar-ruler" style={{ width: info.px + 'px' }}>
            <span className="scalebar-tick"></span><span className="scalebar-tick"></span>
          </div>
          <div className="scalebar-text"><span className="scalebar-main">{info.label}</span><span className="scalebar-sub">{info.sub}</span></div>
        </>
      ) : (
        <div className="scalebar-text"><span className="scalebar-main">LOG SCALE</span><span className="scalebar-sub">distances compressed</span></div>
      )}
    </div>
  );
}

function AppWithContainer({ container }) {
  const ref = useRef(container);
  return <AppInner containerRef={ref} />;
}

function AppInner({ containerRef }) {
  const [sim, setSim] = useState(null);
  const simRef = useRef(null);
  const selectRef = useRef(null);

  const [state, setState] = useState({
    mode: 'hybrid',
    magnify: 5,
    showOrbits: true,
    showLabels: true,
    showAsteroids: true,
    showStars: true,
    showHabitableZone: false,
    showEcliptic: false,
    showConstellations: false,
    showMagnetospheres: false,
    showComets: true,
    showSpacecraft: true,
    showDwarfPlanets: true,
    physVelocity: false,
    physAreaSweep: false,
    physHill: false,
    physLagrange: false,
    physBary: false,
    paused: false,
    simSpeed: 30,
    selectedId: null,
    hoveredId: null,
  });

  const dispatch = useCallback((patch) => {
    setState(s => ({ ...s, ...patch }));
  }, []);

  const [searchQ, setSearchQ] = useState('');
  const [searchFocused, setSearchFocused] = useState(false);
  const [simDate, setSimDate] = useState(new Date());
  const [cameraDist, setCameraDist] = useState(0);
  const [followingId, setFollowingId] = useState(null);
  const [showKbdHelp, setShowKbdHelp] = useState(false);
  const [tour, setTour] = useState({ active: false, step: 0 });
  const [libraryOpen, setLibraryOpen] = useState(false);
  const [moonDetail, setMoonDetail] = useState(null);
  const [photoMode, setPhotoMode] = useState(false);
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [mobileBodies, setMobileBodies] = useState(false);
  const [activeTour, setActiveTour] = useState(null);   // { id, step, narration }
  const [measureMode, setMeasureMode] = useState(false);
  const [measurePicks, setMeasurePicks] = useState([]);
  const [compareId, setCompareId] = useState(null);
  const [rightCollapsed, setRightCollapsed] = useState(false);
  const [showIntro, setShowIntro] = useState(() => !localStorage.getItem('solar_seen_intro'));
  const [toast, setToast] = useState(null);
  const [disclaimerDim, setDisclaimerDim] = useState(false);
  const toastTimer = useRef(null);

  // Reflect mobile sheets on the ui-root for CSS-driven bottom-sheet layout.
  useEffect(() => {
    const root = document.getElementById('ui-root');
    if (root) root.classList.toggle('mobile-bodies-open', mobileBodies);
  }, [mobileBodies]);
  // Selecting a body closes the bodies sheet so the detail sheet can show.
  useEffect(() => { if (state.selectedId) setMobileBodies(false); }, [state.selectedId]);
  // Mark selection on ui-root so the mobile detail sheet only shows when relevant.
  useEffect(() => {
    const root = document.getElementById('ui-root');
    if (root) root.classList.toggle('has-selection', !!state.selectedId);
  }, [state.selectedId]);

  // Reflect collapsed state on the grid container so it reclaims the column.
  useEffect(() => {
    const root = document.getElementById('ui-root');
    if (root) root.classList.toggle('right-collapsed', rightCollapsed);
  }, [rightCollapsed]);

  // Auto-open the panel when a body becomes selected.
  const prevSelRef = useRef(null);
  useEffect(() => {
    if (state.selectedId && prevSelRef.current !== state.selectedId) {
      setRightCollapsed(false);
    }
    prevSelRef.current = state.selectedId;
  }, [state.selectedId]);

  // Toggle photo-mode body class
  useEffect(() => {
    document.body.classList.toggle('photo-mode', photoMode);
    return () => document.body.classList.remove('photo-mode');
  }, [photoMode]);

  // Esc exits photo mode + measure mode + active tour
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        setCmdkOpen(o => !o);
        return;
      }
      const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target && e.target.tagName) || '');
      if (!typing && !e.metaKey && !e.ctrlKey && !e.altKey) {
        if (e.key === '/') { e.preventDefault(); setCmdkOpen(true); return; }
        const planetKeys = { '1': 'mercury', '2': 'venus', '3': 'earth', '4': 'mars', '5': 'jupiter', '6': 'saturn', '7': 'uranus', '8': 'neptune', '9': 'sun', '0': 'pluto' };
        if (planetKeys[e.key]) { e.preventDefault(); if (selectRef.current) selectRef.current(planetKeys[e.key]); return; }
      }
      if (e.key === 'Escape') {
        if (cmdkOpen) setCmdkOpen(false);
        if (photoMode) setPhotoMode(false);
        if (measureMode) { setMeasureMode(false); setMeasurePicks([]); }
        if (activeTour) setActiveTour(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [photoMode, measureMode, activeTour, cmdkOpen]);

  useEffect(() => {
    const s = new window.SolarSystem3D(containerRef.current);
    simRef.current = s;
    setSim(s);
    window.__solarSim = s;
    window.dispatchEvent(new Event('solar-sim-ready'));

    // Restore a shared view from the URL hash (mode · body · date · scale).
    const shared = SHARE.parse();
    if (shared) {
      const patch = {};
      if (shared.mode) patch.mode = shared.mode;
      if (shared.magnify != null) patch.magnify = shared.magnify;
      if (shared.selectedId) patch.selectedId = shared.selectedId;
      if (Object.keys(patch).length) setState(prev => ({ ...prev, ...patch }));
      if (shared.date) { try { s.setSimDate(new Date(shared.date)); } catch (e) {} }
      if (shared.selectedId) setTimeout(() => { try { s.flyTo(shared.selectedId); } catch (e) {} }, 800);
      // Only a MEANINGFUL deep-link (specific body or date) skips the welcome.
      // Mode/magnify get auto-written to the hash on every load, so they must
      // not count — otherwise the intro would be suppressed on every reload.
      if (shared.selectedId || shared.date) setShowIntro(false);
    }

    s.callbacks.onSelect = (id) => {
      setState(prev => ({ ...prev, selectedId: id }));
      s.flyTo(id);
    };
    s.callbacks.onHover = (id) => {
      setState(prev => ({ ...prev, hoveredId: id }));
    };
    setTimeout(() => {
      const sp = document.getElementById('splash');
      if (sp) {
        sp.classList.add('fade-out');
        setTimeout(() => sp.style.display = 'none', 700);
      }
    }, 600);
    return () => s.dispose();
  }, []);

  useEffect(() => {
    if (!sim) return;
    sim.setMode(state.mode);
    sim.setMagnify(state.magnify);
    sim.setShowOrbits(state.showOrbits);
    sim.setShowLabels(state.showLabels);
    sim.setShowAsteroids(state.showAsteroids);
    sim.setShowStars(state.showStars);
    sim.setShowHabitableZone(state.showHabitableZone);
    if (sim.setShowEcliptic) sim.setShowEcliptic(state.showEcliptic);
    if (sim.setShowConstellations) sim.setShowConstellations(state.showConstellations);
    sim.setShowMagnetospheres(state.showMagnetospheres);
    sim.setShowComets(state.showComets);
    sim.setShowSpacecraft(state.showSpacecraft);
    sim.setShowDwarfPlanets(state.showDwarfPlanets);
    sim.setSelectedId(state.selectedId);
    if (sim.setPhysVelocity) {
      sim.setPhysVelocity(state.physVelocity);
      sim.setPhysAreaSweep(state.physAreaSweep);
      sim.setPhysHill(state.physHill);
      sim.setPhysLagrange(state.physLagrange);
      sim.setPhysBarycentre(state.physBary);
    }
    sim.setPaused(state.paused);
    sim.setSimSpeed(state.simSpeed);
  }, [sim, state]);

  useEffect(() => {
    if (!sim) return;
    const interval = setInterval(() => {
      setSimDate(sim.getSimDate());
      setCameraDist(sim.getCameraDistanceFromSun());
      setFollowingId(sim.state.followTarget);
    }, 150);
    return () => clearInterval(interval);
  }, [sim]);

  const handleSelectBody = useCallback((id) => {
    if (!sim) return;
    setState(prev => ({ ...prev, selectedId: id }));
    sim.flyTo(id);
    setSearchQ('');
    setSearchFocused(false);
  }, [sim]);
  selectRef.current = handleSelectBody;

  // Bridge for the add-ons module (separate React root): expose a way to
  // select a body and broadcast the current selection + sim date.
  useEffect(() => {
    window.__solarSelectBody = handleSelectBody;
  }, [handleSelectBody]);
  useEffect(() => {
    window.__solarSelectedId = state.selectedId;
    window.dispatchEvent(new CustomEvent('solar-selection', { detail: state.selectedId }));
  }, [state.selectedId]);
  useEffect(() => {
    window.dispatchEvent(new CustomEvent('solar-date', { detail: simDate }));
  }, [simDate]);

  // Intercept clicks when measure-mode is active — instead of selecting,
  // pick bodies into the measurePicks list. Two picks → measurement HUD.
  useEffect(() => {
    if (!sim) return;
    sim.callbacks.onSelect = (id) => {
      if (measureMode) {
        setMeasurePicks(prev => [...prev, id].slice(-2));
        return;
      }
      setState(prev => ({ ...prev, selectedId: id }));
      sim.flyTo(id);
    };
  }, [sim, measureMode]);

  // Compute live measurement (between two selected bodies)
  const measurement = useMemo(() => {
    if (measurePicks.length < 2) return null;
    const OM = window.OrbitalMechanics;
    if (!OM) return null;
    const date = simDate;
    const lookupAU = (id) => {
      if (OM.ELEMENTS[id]) return OM.planetHeliocentricAU(id, date);
      const comet = (window.COMETS || []).find(c => c.id === id);
      if (comet) return OM.cometHeliocentricAU(comet.elements, date);
      const craft = (window.SPACECRAFT || []).find(c => c.id === id);
      if (craft) return window.spacecraftPositionAU(craft, date);
      if (id === 'sun') return { x: 0, y: 0, z: 0 };
      return null;
    };
    const a = lookupAU(measurePicks[0]);
    const b = lookupAU(measurePicks[1]);
    if (!a || !b) return null;
    const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
    const au = Math.hypot(dx, dy, dz);
    const nameLookup = (id) => {
      const bb = window.SOL_DATA.find(x => x.id === id) ||
                 (window.DWARF_PLANETS || []).find(x => x.id === id) ||
                 (window.COMETS || []).find(x => x.id === id) ||
                 (window.SPACECRAFT || []).find(x => x.id === id);
      return bb ? bb.name : id;
    };
    return { au, km: au * 149597870.7, lightMin: au * 8.317, a: nameLookup(measurePicks[0]), b: nameLookup(measurePicks[1]) };
  }, [measurePicks, simDate]);

  // Auto-clear compare when selection cleared
  useEffect(() => {
    if (compareId && !state.selectedId) setCompareId(null);
  }, [compareId, state.selectedId]);

  const handleReset = useCallback(() => {
    if (!sim) return;
    sim.resetView();
    setState(prev => ({ ...prev, selectedId: null }));
  }, [sim]);

  const handleTopDown = useCallback(() => { if (sim) sim.topDownView(); }, [sim]);

  // Tour system: select from window.TOURS and step through narrated stops.
  const startTour = useCallback((tourId) => {
    const tour = (window.TOURS || []).find(t => t.id === tourId);
    if (!tour) return;
    setTour({ active: true, step: 0, id: tourId });
  }, []);
  const stopTour = useCallback(() => {
    setTour({ active: false, step: 0, id: null });
    setActiveTour(null);
  }, []);

  useEffect(() => {
    if (!tour.active || !sim || !tour.id) return;
    const tourData = (window.TOURS || []).find(t => t.id === tour.id);
    if (!tourData) { stopTour(); return; }
    const step = tourData.steps[tour.step];
    if (!step) { stopTour(); return; }
    sim.flyTo(step.bodyId, { duration: 1800 });
    setState(prev => ({ ...prev, selectedId: step.bodyId }));
    setActiveTour({
      id: tour.id, name: tourData.name,
      step: tour.step, total: tourData.steps.length,
      narration: step.narration,
    });
    const t = setTimeout(() => {
      setTour(prev => prev.active ? { ...prev, step: prev.step + 1 } : prev);
    }, 8500);
    return () => clearTimeout(t);
  }, [tour.active, tour.step, tour.id, sim, stopTour]);

  const searchResults = useMemo(() => {
    if (!searchQ.trim()) return [];
    const q = searchQ.toLowerCase();
    return window.SOL_DATA.filter(b => b.name.toLowerCase().includes(q)).slice(0, 6);
  }, [searchQ]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  }, []);

  const dismissIntro = useCallback(() => {
    localStorage.setItem('solar_seen_intro', '1');
    setShowIntro(false);
  }, []);
  const beginTour = useCallback(() => {
    dismissIntro();
    const first = (window.TOURS || [])[0];
    if (first) startTour(first.id);
  }, [dismissIntro, startTour]);

  const getShareData = useCallback(() => {
    const id = state.selectedId;
    let name = null;
    if (id) {
      const b = window.SOL_DATA.find(x => x.id === id)
        || (window.DWARF_PLANETS || []).find(x => x.id === id)
        || (window.COMETS || []).find(x => x.id === id)
        || (window.SPACECRAFT || []).find(x => x.id === id);
      name = b ? b.name : null;
    }
    return {
      mode: state.mode,
      selectedId: id,
      magnify: state.magnify,
      date: simDate.toISOString().slice(0, 10),
      subjectName: name || 'The Solar System',
    };
  }, [state.selectedId, state.mode, state.magnify, simDate]);

  // Keep the URL hash in sync with the discrete view state (mode/body/scale).
  useEffect(() => {
    if (!sim) return;
    SHARE.write({ mode: state.mode, selectedId: state.selectedId, magnify: state.magnify });
  }, [sim, state.mode, state.selectedId, state.magnify]);

  // Calmer default: the scale disclaimer settles away, returns on mode change.
  useEffect(() => {
    setDisclaimerDim(false);
    const t = setTimeout(() => setDisclaimerDim(true), 5200);
    return () => clearTimeout(t);
  }, [state.mode]);

  const modes = [
    { id: 'hybrid', label: 'Hybrid' },
    { id: 'real_distance', label: 'Real Distance' },
    { id: 'real_size', label: 'Real Size' },
    { id: 'true_scale', label: 'True 1:1' },
  ];

  return (
    <>
      <div id="toolbar">
        <div className="brand">
          <div className="brand-logo"></div>
          <div className="brand-text">
            <div className="brand-name"><span className="bn-1">Solar</span><span className="bn-2">3D</span></div>
            <div className="brand-tag">True Scale Observatory</div>
          </div>
        </div>
        <div className="toolbar-sep"></div>
        <div className="mode-tabs">
          {modes.map(m => (
            <button key={m.id} className={`mode-tab ${state.mode === m.id ? 'active' : ''}`} onClick={() => dispatch({ mode: m.id })}>
              {m.label}
            </button>
          ))}
        </div>
        <div className="toolbar-sep"></div>
        <div className="search-wrap">
          <span className="search-icon"><Icon name="search" size={13} /></span>
          <input
            type="text" className="search-input"
            placeholder="Search bodies..."
            value={searchQ}
            onChange={e => setSearchQ(e.target.value)}
            onFocus={() => setSearchFocused(true)}
            onBlur={() => setTimeout(() => setSearchFocused(false), 150)}
          />
          {searchFocused && searchResults.length > 0 && (
            <div className="search-results">
              {searchResults.map(body => (
                <div key={body.id} className="search-result-item" onMouseDown={() => handleSelectBody(body.id)}>
                  <div className="search-result-dot" style={{
                    background: `radial-gradient(circle at 30% 30%, ${lighten(body.color, 0.3)}, ${body.color})`
                  }}></div>
                  <span>{body.name}</span>
                  {body.distanceAU > 0 && <span style={{ marginLeft: 'auto', color: 'var(--text-muted)', fontSize: 9 }}>{body.distanceAU.toFixed(2)} AU</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="toolbar-spacer"></div>
        <button className="tool-btn cmdk-btn" onClick={() => setCmdkOpen(true)} title="Command palette (⌘K)"><Icon name="search" /><span>Command</span><span className="kbd-chip">⌘K</span></button>
        <button className="tool-btn" onClick={() => setLibraryOpen(true)} title="Reference library"><Icon name="library" /><span>Library</span></button>
        <button
          className={`tool-btn ${measureMode ? 'primary' : ''}`}
          onClick={() => { setMeasureMode(m => !m); setMeasurePicks([]); }}
          title="Measure distance between two bodies"
        ><Icon name="measure" /><span>{measureMode ? 'Measuring…' : 'Measure'}</span></button>
        <button
          className={`tool-btn ${compareId ? 'primary' : ''}`}
          onClick={() => {
            if (compareId) { setCompareId(null); }
            else if (state.selectedId) setCompareId(state.selectedId);
          }}
          title={compareId ? 'Unpin comparison' : 'Pin current selection for comparison'}
        ><Icon name="compare" /><span>{compareId ? 'Compare ON' : 'Compare'}</span></button>
        <button className="tool-btn ghost" onClick={handleTopDown}><Icon name="topdown" /><span>Top-Down</span></button>
        <button className="tool-btn ghost" onClick={handleReset}><Icon name="reset" /><span>Reset</span></button>
        <button className="tool-btn ghost" onClick={() => setPhotoMode(true)} title="Hide UI for clean screenshot (Esc to exit)"><Icon name="photo" /><span>Photo</span></button>
        <ShareControl getShareData={getShareData} onToast={showToast} />
        <TourMenu activeTour={tour} onStart={startTour} onStop={stopTour} />
      </div>

      <LeftPanel state={state} dispatch={dispatch} onSelectBody={handleSelectBody} />

      <div className="middle-area">
        <Telemetry sim={sim} simDate={simDate} cameraDist={cameraDist} selectedId={state.selectedId} />
        <Minimap sim={sim} simDate={simDate} selectedId={state.selectedId} mode={state.mode} onSelectBody={handleSelectBody} />
        <ScaleBar sim={sim} mode={state.mode} cameraDist={cameraDist} />
        <LabelLayer sim={sim} showLabels={state.showLabels} selectedId={state.selectedId} hoveredId={state.hoveredId} />
        <div className={`scale-disclaimer ${disclaimerDim ? 'dimmed' : ''}`}>
          {state.mode === 'true_scale'
            ? 'TRUE 1:1 scale — sizes & distances both real. Locator dots mark sub-pixel planets.'
            : state.mode === 'real_distance'
            ? 'Distances at true linear scale — planets shrink dramatically'
            : state.mode === 'real_size'
            ? 'Diameters at true relative ratio — distances still log-compressed'
            : 'Adaptive: log distances + magnified bodies for visibility'}
        </div>

        {activeTour && (
          <div className="tour-narration">
            <div className="tour-narration-eyebrow">
              {activeTour.name} · stop {activeTour.step + 1}/{activeTour.total}
            </div>
            <div className="tour-narration-text">{activeTour.narration}</div>
          </div>
        )}

        {measureMode && (
          <div className="measure-hud">
            <span className="measure-hud-label"><Icon name="measure" size={13} /><span>Measure</span></span>
            {measurement ? (
              <>
                <span className="measure-hud-bodies">{measurement.a} ↔ {measurement.b}</span>
                <span className="measure-hud-value">
                  {measurement.au < 1
                    ? measurement.km.toLocaleString(undefined, {maximumFractionDigits: 0}) + ' km'
                    : measurement.au.toFixed(3) + ' AU'}
                </span>
                <span className="measure-hud-light">
                  · light-time {measurement.lightMin < 1
                    ? (measurement.lightMin * 60).toFixed(1) + ' s'
                    : measurement.lightMin < 60
                      ? measurement.lightMin.toFixed(1) + ' min'
                      : (measurement.lightMin / 60).toFixed(2) + ' hr'}
                </span>
              </>
            ) : (
              <span className="measure-hud-bodies">
                {measurePicks.length === 0 ? 'Click two bodies in the scene' : 'Click one more body…'}
              </span>
            )}
          </div>
        )}

        <EventBanner simDate={simDate} />
      </div>

      <RightPanel
        selectedId={state.selectedId}
        simDate={simDate}
        onMoonClick={(m, parent) => setMoonDetail({ moon: m, parent })}
        onAction={(action) => {
          if (action === 'flyto' && state.selectedId) sim?.flyTo(state.selectedId);
          if (action === 'reset') handleReset();
        }}
      />

      <button
        className={`right-toggle ${rightCollapsed ? 'collapsed' : ''}`}
        onClick={() => setRightCollapsed(c => !c)}
        title={rightCollapsed ? 'Show info panel' : 'Hide info panel'}
        aria-label={rightCollapsed ? 'Show info panel' : 'Hide info panel'}
      >
        {rightCollapsed ? '‹' : '›'}
      </button>

      {showKbdHelp ? (
        <div className="kbd-help">
          <div className="kbd-help-title">
            <span>Controls</span>
            <button className="kbd-help-close" onClick={() => setShowKbdHelp(false)}><Icon name="close" size={12} /></button>
          </div>

          <div className="kbd-help-section">Mouse</div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">L-drag</span></div>
            <span className="kbd-help-desc">Rotate around target</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">R-drag</span></div>
            <span className="kbd-help-desc">Pan view</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">M-drag</span></div>
            <span className="kbd-help-desc">Pan view (alt)</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">⇧</span><span style={{ color: 'var(--text-muted)', fontSize: 8 }}>+</span><span className="kbd-key">L-drag</span></div>
            <span className="kbd-help-desc">Pan (trackpad)</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">scroll</span></div>
            <span className="kbd-help-desc">Zoom in / out</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">click</span></div>
            <span className="kbd-help-desc">Select + follow body</span>
          </div>

          <div className="kbd-help-section">Keyboard · Free-Flight</div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">W</span><span className="kbd-key">A</span><span className="kbd-key">S</span><span className="kbd-key">D</span></div>
            <span className="kbd-help-desc">Fly through space</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">Q</span><span className="kbd-key">E</span></div>
            <span className="kbd-help-desc">Down / Up</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">⇧</span></div>
            <span className="kbd-help-desc">Hold to boost ×4</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">←↑→↓</span></div>
            <span className="kbd-help-desc">Alt. WASD</span>
          </div>

          <div className="kbd-help-section">Keyboard · Shortcuts</div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">⌘</span><span style={{ color: 'var(--text-muted)', fontSize: 8 }}>+</span><span className="kbd-key">K</span></div>
            <span className="kbd-help-desc">Command palette</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">/</span></div>
            <span className="kbd-help-desc">Command palette</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">1</span><span style={{ color: 'var(--text-muted)', fontSize: 8 }}>–</span><span className="kbd-key">8</span></div>
            <span className="kbd-help-desc">Jump to planet</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">9</span><span className="kbd-key">0</span></div>
            <span className="kbd-help-desc">Sun · Pluto</span>
          </div>
          <div className="kbd-help-row">
            <div className="kbd-help-keys"><span className="kbd-key">Esc</span></div>
            <span className="kbd-help-desc">Close overlays</span>
          </div>
        </div>
      ) : (
        <button className="kbd-help-toggle" onClick={() => setShowKbdHelp(true)} title="Controls">?</button>
      )}

      <BottomBar state={state} dispatch={dispatch} sim={sim} simDate={simDate} cameraDist={cameraDist} followingId={followingId} />

      <LibraryModal
        open={libraryOpen}
        onClose={() => setLibraryOpen(false)}
        onSelectBody={(id) => { setLibraryOpen(false); handleSelectBody(id); }}
      />

      <MoonDetailModal
        moon={moonDetail && moonDetail.moon}
        parentBody={moonDetail && moonDetail.parent}
        onClose={() => setMoonDetail(null)}
      />

      <CompareModal
        pinnedId={compareId}
        currentId={state.selectedId}
        onClose={() => setCompareId(null)}
      />

      {photoMode && (
        <div className="photo-mode-overlay">
          <span className="photo-mode-overlay-text"><Icon name="photo" size={14} /><span>Photo mode · UI hidden</span></span>
          <button
            className="photo-mode-exit"
            style={{ background: 'transparent', border: '1px solid var(--glass-border-bright)', color: 'var(--cyan)' }}
            onClick={() => { const d = getShareData(); savePostcard(window.__solarSim, { subject: d.subjectName, date: d.date }); showToast('Postcard saved to downloads'); }}
          ><Icon name="download" size={13} /><span>Save Postcard</span></button>
          <button
            className="photo-mode-exit"
            style={{ background: 'transparent', border: '1px solid var(--brand-gold-soft)', color: 'var(--brand-gold)' }}
            onClick={() => {
              const sim = window.__solarSim;
              if (!sim || !sim.renderer) return;
              try {
                sim.renderer.render(sim.scene, sim.camera);
                const url = sim.renderer.domElement.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = 'solar3d-frame-' + Date.now() + '.png';
                a.click();
                showToast('Frame exported');
              } catch (err) { showToast('Export failed'); }
            }}
          ><Icon name="download" size={13} /><span>Export Frame</span></button>
          <button className="photo-mode-exit" onClick={() => setPhotoMode(false)}>Exit (Esc)</button>
        </div>
      )}

      {toast && <div className="app-toast">{toast}</div>}

      <div className="mobile-fabs">
        <button className="mobile-fab" onClick={() => setMobileBodies(o => !o)} aria-label="Bodies">
          <Icon name={mobileBodies ? 'close' : 'list'} size={20} />
        </button>
        <button className="mobile-fab" onClick={() => setCmdkOpen(true)} aria-label="Command">
          <Icon name="search" size={19} />
        </button>
      </div>
      {(mobileBodies || state.selectedId) && (
        <div className="mobile-scrim" onClick={() => {
          if (mobileBodies) setMobileBodies(false);
          else if (state.selectedId) dispatch({ selectedId: null });
        }}></div>
      )}

      <CommandPalette
        open={cmdkOpen}
        onClose={() => setCmdkOpen(false)}
        onSelectBody={handleSelectBody}
        dispatch={dispatch}
        state={state}
        sim={sim}
        onToast={showToast}
      />

      {showIntro && <IntroOverlay onBegin={dismissIntro} onTour={beginTour} />}
    </>
  );
}

init();
</script>
<script type="text/babel" src="addons.jsx?v=4"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=1"></script>
<script type="text/babel" src="premium-tweaks.jsx?v=1"></script>
<script type="text/babel" src="pro-tools.jsx?v=1"></script>
</body>
</html>
